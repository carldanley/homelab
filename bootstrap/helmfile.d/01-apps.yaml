---
helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    chart: oci://quay.io/cilium/charts/cilium
    version: 1.19.5
    values: ["./templates/values.yaml.gotmpl"]
    hooks:
      - events: ["postsync"]
        command: sh
        args:
          - -ec
          - |
            for crd in \
              ciliumbgpadvertisements.cilium.io \
              ciliumbgpclusterconfigs.cilium.io \
              ciliumbgppeerconfigs.cilium.io \
              ciliuml2announcementpolicies.cilium.io \
              ciliumloadbalancerippools.cilium.io; do
              until kubectl wait --for=condition=Established "crd/${crd}" --timeout=10s; do
                sleep 2
              done
            done

            until kubectl wait nodes --for=condition=Ready=True --all --timeout=2m; do
              sleep 5
            done

            kubectl apply \
              --server-side \
              --namespace=kube-system \
              --field-manager=kustomize-controller \
              --kustomize ../../kubernetes/apps/kube-system/cilium/config
        showlogs: true

  - name: coredns
    namespace: kube-system
    chart: oci://ghcr.io/coredns/charts/coredns
    version: 1.46.0
    values: ["./templates/values.yaml.gotmpl"]
    needs: ["kube-system/cilium"]

  - name: spegel
    namespace: kube-system
    chart: oci://ghcr.io/spegel-org/helm-charts/spegel
    version: 0.7.4
    values: ["./templates/values.yaml.gotmpl"]
    needs: ["kube-system/coredns"]

  - name: external-secrets
    namespace: external-secrets
    chart: oci://ghcr.io/external-secrets/charts/external-secrets
    version: 2.7.0
    values: ["./templates/values.yaml.gotmpl"]
    needs: ["kube-system/spegel"]

  - name: onepassword
    namespace: external-secrets
    chart: oci://ghcr.io/bjw-s-labs/helm/app-template
    version: 5.0.1
    values: ["./templates/values.yaml.gotmpl"]
    hooks:
      - events: ["postsync"]
        command: kubectl
        args:
          - apply
          - --namespace=external-secrets
          - --server-side
          - --field-manager=kustomize-controller
          - --filename
          - ../../kubernetes/apps/external-secrets/onepassword/store/onepassword.yaml
          - --wait=true
        showlogs: true
    needs: ["external-secrets/external-secrets"]

  - name: cert-manager
    namespace: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.21.0
    values: ["./templates/values.yaml.gotmpl"]
    needs: ["external-secrets/onepassword"]

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.55.0
    values: ["./templates/values.yaml.gotmpl"]
    needs: ["cert-manager/cert-manager"]

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.55.0
    values: ["./templates/values.yaml.gotmpl"]
    needs: ["flux-system/flux-operator"]
