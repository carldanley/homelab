---
helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

releases:
  - name: cilium
    namespace: kube-system
    chart: oci://ghcr.io/home-operations/charts-mirror/cilium
    version: 1.17.4
    values:
      - "../kubernetes/apps/kube-system/cilium/app/helm/values.yaml"
    hooks:
      - events:
          - postsync
        command: kubectl
        args:
          - apply
          - --server-side
          - --namespace=kube-system
          - --field-manager=kustomize-controller
          - --kustomize
          - ../kubernetes/apps/kube-system/cilium/config
        showlogs: true
