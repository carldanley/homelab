---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: woodpecker
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: woodpecker
      app.kubernetes.io/name: server
  endpoints:
    - port: http
      path: /metrics
      relabelings:
        - sourceLabels:
            - __meta_kubernetes_service_name
          regex: woodpecker-server
          action: keep
      authorization:
        type: Bearer
        credentials:
          name: woodpecker-secret
          key: WOODPECKER_PROMETHEUS_AUTH_TOKEN
