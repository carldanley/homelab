---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: woodpecker-internal
  labels:
    dns.homelab/external: "false"
spec:
  endpoints:
    - dnsName: "ci.${DOMAIN_7}"
      recordTTL: 60
      recordType: CNAME
      targets:
        - "internal.${DOMAIN_7}"
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: woodpecker-external
  labels:
    dns.homelab/external: "true"
spec:
  endpoints:
    - dnsName: "ci.${DOMAIN_7}"
      recordTTL: 60
      recordType: CNAME
      targets:
        - "external.${DOMAIN_7}"
