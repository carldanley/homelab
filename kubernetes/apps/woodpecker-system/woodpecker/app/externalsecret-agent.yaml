---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: woodpecker-agent
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    # The agent subchart always reads this chart-defined Secret name.
    name: woodpecker-default-agent-secret
    template:
      data:
        WOODPECKER_AGENT_SECRET: "{{ .WOODPECKER_AGENT_SECRET }}"
  dataFrom:
    - extract:
        key: woodpecker
