---
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: woodpecker-cargo-cache-v1
spec:
  generateBucketName: woodpecker-cargo-cache-v1
  storageClassName: ceph-object-cache
  additionalConfig:
    maxObjects: "10000"
    maxSize: "100G"
    bucketLifecycle: |
      {
        "Rules": [
          {
            "ID": "AbortIncompleteMultipartUploads",
            "Status": "Enabled",
            "Prefix": "",
            "AbortIncompleteMultipartUpload": {
              "DaysAfterInitiation": 1
            }
          },
          {
            "ID": "ExpireAfter30Days",
            "Status": "Enabled",
            "Prefix": "",
            "Expiration": {
              "Days": 30
            }
          }
        ]
      }
