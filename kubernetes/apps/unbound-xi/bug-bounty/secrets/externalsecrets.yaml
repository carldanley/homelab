---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bug-bounty-registry
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: bug-bounty-registry
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >-
          {"auths":{"git.r1p.dev":{"username":"{{ .REGISTRY_USERNAME }}","password":"{{ .REGISTRY_TOKEN }}"}}}
  dataFrom:
    - extract:
        key: bug-bounty-registry
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bug-bounty-provider-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: bug-bounty-provider-config
    template:
      data:
        BUG_BOUNTY_DISCORD_CLIENT_ID: "{{ .DISCORD_APP_CLIENT_ID | quote }}"
        BUG_BOUNTY_AUTHENTIK_CLIENT_ID: "{{ .AUTHENTIK_CLIENT_ID | quote }}"
        BUG_BOUNTY_AUTHENTIK_REQUIRED_AMR: "{{ .AUTHENTIK_REQUIRED_AMR | quote }}"
  dataFrom:
    - extract:
        key: unbound-bug-bounty
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bug-bounty-postgres-superuser
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: bug-bounty-postgres-superuser
    template:
      data:
        username: postgres
        password: "{{ .POSTGRES_SUPERUSER_PASSWORD }}"
      metadata:
        labels:
          cnpg.io/reload: "true"
  dataFrom:
    - extract:
        key: bug-bounty
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bug-bounty-postgres-admin-database
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: bug-bounty-postgres-admin-database
    template:
      data:
        BUG_BOUNTY_BOOTSTRAP_DATABASE_URL: >-
          postgresql://postgres:{{ .POSTGRES_SUPERUSER_PASSWORD | urlquery }}@bug-bounty-postgres-rw.unbound-xi.svc.cluster.local:5432/bug_bounty?sslmode=require
  dataFrom:
    - extract:
        key: bug-bounty
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bug-bounty-migrator-database
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: bug-bounty-migrator-database
    template:
      data:
        username: bug_bounty_migrator
        password: "{{ .POSTGRES_MIGRATOR_PASSWORD }}"
        DATABASE_PASSWORD: "{{ .POSTGRES_MIGRATOR_PASSWORD }}"
        BUG_BOUNTY_DATABASE_URL: >-
          postgresql://bug_bounty_migrator:{{ .POSTGRES_MIGRATOR_PASSWORD | urlquery }}@bug-bounty-postgres-rw.unbound-xi.svc.cluster.local:5432/bug_bounty?sslmode=require
      metadata:
        labels:
          cnpg.io/reload: "true"
  dataFrom:
    - extract:
        key: bug-bounty
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bug-bounty-runtime-database
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: bug-bounty-runtime-database
    template:
      data:
        username: bug_bounty_runtime_login
        password: "{{ .POSTGRES_RUNTIME_PASSWORD }}"
        DATABASE_PASSWORD: "{{ .POSTGRES_RUNTIME_PASSWORD }}"
        BUG_BOUNTY_DATABASE_URL: >-
          postgresql://bug_bounty_runtime_login:{{ .POSTGRES_RUNTIME_PASSWORD | urlquery }}@bug-bounty-postgres-rw.unbound-xi.svc.cluster.local:5432/bug_bounty?sslmode=require
  dataFrom:
    - extract:
        key: bug-bounty
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bug-bounty-exporter-database
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: bug-bounty-exporter-database
    template:
      data:
        username: bug_bounty_exporter_login
        password: "{{ .POSTGRES_EXPORTER_PASSWORD }}"
        DATABASE_PASSWORD: "{{ .POSTGRES_EXPORTER_PASSWORD }}"
        BUG_BOUNTY_DATABASE_URL: >-
          postgresql://bug_bounty_exporter_login:{{ .POSTGRES_EXPORTER_PASSWORD | urlquery }}@bug-bounty-postgres-rw.unbound-xi.svc.cluster.local:5432/bug_bounty?sslmode=require
  dataFrom:
    - extract:
        key: bug-bounty
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bug-bounty-secrets
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: bug-bounty-secrets
    template:
      data:
        BUG_BOUNTY_CURSOR_SIGNING_KEY: "{{ .BUG_BOUNTY_CURSOR_SIGNING_KEY }}"
        BUG_BOUNTY_ABUSE_HASHING_KEY: "{{ .BUG_BOUNTY_ABUSE_HASHING_KEY }}"
        BUG_BOUNTY_DISCORD_CLIENT_SECRET: "{{ .DISCORD_APP_CLIENT_SECRET }}"
        BUG_BOUNTY_AUTHENTIK_CLIENT_SECRET: "{{ .AUTHENTIK_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: bug-bounty
    - extract:
        key: unbound-bug-bounty
