---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bug-bounty-migrate
  labels:
    app.kubernetes.io/part-of: bug-bounty
automountServiceAccountToken: false
imagePullSecrets:
  - name: bug-bounty-registry
---
apiVersion: batch/v1
kind: Job
metadata:
  name: bug-bounty-migrate-v0-1-3
  labels:
    app.kubernetes.io/name: bug-bounty-migrate
    app.kubernetes.io/part-of: bug-bounty
    app.kubernetes.io/version: v0.1.3
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bug-bounty-migrate
        app.kubernetes.io/part-of: bug-bounty
        app.kubernetes.io/version: v0.1.3
        bug-bounty.unbound-xi.org/workload: migrate
    spec:
      restartPolicy: OnFailure
      serviceAccountName: bug-bounty-migrate
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: git.r1p.dev/unbound-xi/bug-bounty-server@sha256:14bb11f4c2d180b044060c2084db9b44f442f60abd87f19522ccc853496181ff
          imagePullPolicy: IfNotPresent
          args:
            - migrate
          env:
            - name: BUG_BOUNTY_ENVIRONMENT
              value: test
            - name: BUG_BOUNTY_ADAPTER_MODE
              value: synthetic
            - name: BUG_BOUNTY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bug-bounty-migrator-database
                  key: BUG_BOUNTY_DATABASE_URL
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
