---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app bug-bounty-secrets
  namespace: &namespace unbound-xi
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
      app.kubernetes.io/part-of: bug-bounty
  dependsOn:
    - name: onepassword-store
      namespace: external-secrets
  healthCheckExprs:
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
  interval: 1h
  path: ./kubernetes/apps/unbound-xi/bug-bounty/secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app bug-bounty-data
  namespace: &namespace unbound-xi
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
      app.kubernetes.io/part-of: bug-bounty
  dependsOn:
    - name: bug-bounty-secrets
      namespace: *namespace
    - name: cloudnative-pg
      namespace: databases
    - name: openebs
      namespace: openebs-system
    - name: rook-ceph-object-store
      namespace: rook-ceph
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: bug-bounty-postgres
      namespace: *namespace
    - apiVersion: objectbucket.io/v1alpha1
      kind: ObjectBucketClaim
      name: bug-bounty-object-store-quarantine
      namespace: *namespace
    - apiVersion: objectbucket.io/v1alpha1
      kind: ObjectBucketClaim
      name: bug-bounty-object-store-clean
      namespace: *namespace
  healthCheckExprs:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      inProgress: '!has(status.conditions) || status.conditions.filter(e, e.type == "Ready").all(e, e.status != "True")'
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
    - apiVersion: objectbucket.io/v1alpha1
      kind: ObjectBucketClaim
      inProgress: '!has(status.phase) || status.phase == "Pending"'
      failed: has(status.phase) && status.phase in ['Released', 'Failed']
      current: has(status.phase) && status.phase == 'Bound'
  interval: 1h
  path: ./kubernetes/apps/unbound-xi/bug-bounty/data
  postBuild:
    substitute:
      # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/postgresql
      POSTGRESQL_VERSION: 18.3-minimal-trixie@sha256:8d3183ef537b17efbb2e6e6665852a7c0d8dc4a3f3b91c11f0e8a2d056799880
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app bug-bounty-bootstrap
  namespace: &namespace unbound-xi
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
      app.kubernetes.io/part-of: bug-bounty
  dependsOn:
    - name: bug-bounty-data
      namespace: *namespace
  healthChecks:
    - apiVersion: batch/v1
      kind: Job
      name: bug-bounty-bootstrap
      namespace: *namespace
  healthCheckExprs:
    - apiVersion: batch/v1
      kind: Job
      inProgress: '!status.conditions.exists(e, e.type == "Complete" && e.status == "True") && !status.conditions.exists(e, e.type == "Failed" && e.status == "True")'
      failed: status.conditions.exists(e, e.type == 'Failed' && e.status == 'True')
      current: status.conditions.exists(e, e.type == 'Complete' && e.status == 'True')
  interval: 1h
  path: ./kubernetes/apps/unbound-xi/bug-bounty/bootstrap
  force: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: bug-bounty-release
        optional: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app bug-bounty-migrate
  namespace: &namespace unbound-xi
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
      app.kubernetes.io/part-of: bug-bounty
  dependsOn:
    - name: bug-bounty-bootstrap
      namespace: *namespace
  healthChecks:
    - apiVersion: batch/v1
      kind: Job
      name: bug-bounty-migrate
      namespace: *namespace
  healthCheckExprs:
    - apiVersion: batch/v1
      kind: Job
      inProgress: '!status.conditions.exists(e, e.type == "Complete" && e.status == "True") && !status.conditions.exists(e, e.type == "Failed" && e.status == "True")'
      failed: status.conditions.exists(e, e.type == 'Failed' && e.status == 'True')
      current: status.conditions.exists(e, e.type == 'Complete' && e.status == 'True')
  interval: 1h
  path: ./kubernetes/apps/unbound-xi/bug-bounty/migrate
  force: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: bug-bounty-release
        optional: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app bug-bounty
  namespace: &namespace unbound-xi
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
      app.kubernetes.io/part-of: bug-bounty
  dependsOn:
    - name: bug-bounty-migrate
      namespace: *namespace
    - name: cilium-gateway
      namespace: kube-system
    - name: grafana-operator-instance
      namespace: observability
    - name: kube-prometheus-stack
      namespace: observability
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: bug-bounty-api
      namespace: *namespace
    - apiVersion: apps/v1
      kind: Deployment
      name: bug-bounty-worker
      namespace: *namespace
    - apiVersion: apps/v1
      kind: Deployment
      name: bug-bounty-website
      namespace: *namespace
    - apiVersion: apps/v1
      kind: Deployment
      name: bug-bounty-assets-proxy
      namespace: *namespace
    - apiVersion: apps/v1
      kind: Deployment
      name: bug-bounty-postgres-exporter
      namespace: *namespace
  interval: 1h
  path: ./kubernetes/apps/unbound-xi/bug-bounty/app
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: bug-bounty-release
        optional: false
      - kind: Secret
        name: domains-secret
        optional: false
      - kind: Secret
        name: bug-bounty-provider-config
        optional: false
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  wait: true
