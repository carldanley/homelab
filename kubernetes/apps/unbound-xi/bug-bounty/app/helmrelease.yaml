---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bug-bounty
  labels:
    app.kubernetes.io/part-of: bug-bounty
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    global:
      labels:
        app.kubernetes.io/part-of: bug-bounty
      propagateGlobalMetadataToPods: true

    controllers:
      api:
        replicas: 1
        labels:
          app.kubernetes.io/component: api
          app.kubernetes.io/version: v0.1.3
        annotations:
          configmap.reloader.stakater.com/reload: bug-bounty-config
          secret.reloader.stakater.com/reload: bug-bounty-runtime-database,bug-bounty-secrets,bug-bounty-object-store-quarantine,bug-bounty-object-store-clean
        pod:
          imagePullSecrets:
            - name: bug-bounty-registry
          labels:
            app.kubernetes.io/component: api
            app.kubernetes.io/version: v0.1.3
            bug-bounty.unbound-xi.org/workload: api
        containers:
          app:
            image:
              repository: git.r1p.dev/unbound-xi/bug-bounty-server
              tag: v0.1.3
              digest: sha256:14bb11f4c2d180b044060c2084db9b44f442f60abd87f19522ccc853496181ff
              pullPolicy: IfNotPresent
            args:
              - api
            envFrom:
              - configMapRef:
                  name: bug-bounty-config
              - secretRef:
                  name: bug-bounty-secrets
            env:
              BUG_BOUNTY_DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: bug-bounty-runtime-database
                    key: BUG_BOUNTY_DATABASE_URL
              BUG_BOUNTY_OBJECT_STORE_QUARANTINE_BUCKET:
                valueFrom:
                  configMapKeyRef:
                    name: bug-bounty-object-store-quarantine
                    key: BUCKET_NAME
              BUG_BOUNTY_OBJECT_STORE_QUARANTINE_ACCESS_KEY_ID:
                valueFrom:
                  secretKeyRef:
                    name: bug-bounty-object-store-quarantine
                    key: AWS_ACCESS_KEY_ID
              BUG_BOUNTY_OBJECT_STORE_QUARANTINE_SECRET_ACCESS_KEY:
                valueFrom:
                  secretKeyRef:
                    name: bug-bounty-object-store-quarantine
                    key: AWS_SECRET_ACCESS_KEY
              BUG_BOUNTY_OBJECT_STORE_CLEAN_BUCKET:
                valueFrom:
                  configMapKeyRef:
                    name: bug-bounty-object-store-clean
                    key: BUCKET_NAME
              BUG_BOUNTY_OBJECT_STORE_CLEAN_ACCESS_KEY_ID:
                valueFrom:
                  secretKeyRef:
                    name: bug-bounty-object-store-clean
                    key: AWS_ACCESS_KEY_ID
              BUG_BOUNTY_OBJECT_STORE_CLEAN_SECRET_ACCESS_KEY:
                valueFrom:
                  secretKeyRef:
                    name: bug-bounty-object-store-clean
                    key: AWS_SECRET_ACCESS_KEY
            ports:
              - name: http
                containerPort: 8080
                protocol: TCP
              - name: metrics
                containerPort: 9090
                protocol: TCP
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: http
                  initialDelaySeconds: 2
                  periodSeconds: 5
                  timeoutSeconds: 2
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: http
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 2
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext: &serverSecurityContext
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
              runAsGroup: 65532
              runAsNonRoot: true
              runAsUser: 65532

      worker:
        replicas: 1
        labels:
          app.kubernetes.io/component: worker
          app.kubernetes.io/version: v0.1.3
        annotations:
          configmap.reloader.stakater.com/reload: bug-bounty-config
          secret.reloader.stakater.com/reload: bug-bounty-runtime-database,bug-bounty-object-store-quarantine,bug-bounty-object-store-clean
        pod:
          imagePullSecrets:
            - name: bug-bounty-registry
          labels:
            app.kubernetes.io/component: worker
            app.kubernetes.io/version: v0.1.3
            bug-bounty.unbound-xi.org/workload: worker
        containers:
          app:
            image:
              repository: git.r1p.dev/unbound-xi/bug-bounty-server
              tag: v0.1.3
              digest: sha256:14bb11f4c2d180b044060c2084db9b44f442f60abd87f19522ccc853496181ff
              pullPolicy: IfNotPresent
            args:
              - worker
            envFrom:
              - configMapRef:
                  name: bug-bounty-config
            env:
              BUG_BOUNTY_DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: bug-bounty-runtime-database
                    key: BUG_BOUNTY_DATABASE_URL
              BUG_BOUNTY_OBJECT_STORE_QUARANTINE_BUCKET:
                valueFrom:
                  configMapKeyRef:
                    name: bug-bounty-object-store-quarantine
                    key: BUCKET_NAME
              BUG_BOUNTY_OBJECT_STORE_QUARANTINE_ACCESS_KEY_ID:
                valueFrom:
                  secretKeyRef:
                    name: bug-bounty-object-store-quarantine
                    key: AWS_ACCESS_KEY_ID
              BUG_BOUNTY_OBJECT_STORE_QUARANTINE_SECRET_ACCESS_KEY:
                valueFrom:
                  secretKeyRef:
                    name: bug-bounty-object-store-quarantine
                    key: AWS_SECRET_ACCESS_KEY
              BUG_BOUNTY_OBJECT_STORE_CLEAN_BUCKET:
                valueFrom:
                  configMapKeyRef:
                    name: bug-bounty-object-store-clean
                    key: BUCKET_NAME
              BUG_BOUNTY_OBJECT_STORE_CLEAN_ACCESS_KEY_ID:
                valueFrom:
                  secretKeyRef:
                    name: bug-bounty-object-store-clean
                    key: AWS_ACCESS_KEY_ID
              BUG_BOUNTY_OBJECT_STORE_CLEAN_SECRET_ACCESS_KEY:
                valueFrom:
                  secretKeyRef:
                    name: bug-bounty-object-store-clean
                    key: AWS_SECRET_ACCESS_KEY
            ports:
              - name: metrics
                containerPort: 9090
                protocol: TCP
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: metrics
                  initialDelaySeconds: 2
                  periodSeconds: 5
                  timeoutSeconds: 2
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: metrics
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 2
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            securityContext: *serverSecurityContext

      website:
        replicas: 1
        labels:
          app.kubernetes.io/component: website
          app.kubernetes.io/version: v0.1.3
        pod:
          imagePullSecrets:
            - name: bug-bounty-registry
          labels:
            app.kubernetes.io/component: website
            app.kubernetes.io/version: v0.1.3
            bug-bounty.unbound-xi.org/workload: website
        containers:
          app:
            image:
              repository: git.r1p.dev/unbound-xi/bug-bounty-website
              tag: v0.1.3
              digest: sha256:c6bcf716dd57cd162867cd350e2425e783f138ee5093e8161e9782cfe2e58ca3
              pullPolicy: IfNotPresent
            ports:
              - name: http
                containerPort: 8080
                protocol: TCP
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: http
                  initialDelaySeconds: 2
                  periodSeconds: 5
                  timeoutSeconds: 2
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: http
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 2
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext: *serverSecurityContext

      assets-proxy:
        replicas: 1
        labels:
          app.kubernetes.io/component: assets-proxy
        annotations:
          configmap.reloader.stakater.com/reload: bug-bounty-assets-proxy
        pod:
          labels:
            app.kubernetes.io/component: assets-proxy
            bug-bounty.unbound-xi.org/workload: assets-proxy
        containers:
          app:
            image:
              repository: ghcr.io/nginxinc/nginx-unprivileged
              tag: 1.27.4-alpine@sha256:e234d4f7e346c098f7b22245690372382aded5be988611eb2c53ae62231eece7
              pullPolicy: IfNotPresent
            command:
              - nginx
            args:
              - -g
              - daemon off;
            ports:
              - name: http
                containerPort: 8080
                protocol: TCP
              - name: internal
                containerPort: 8081
                protocol: TCP
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: http
                  initialDelaySeconds: 2
                  periodSeconds: 5
                  timeoutSeconds: 2
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: http
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 2
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
            securityContext: &publicImageSecurityContext
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
              runAsNonRoot: true

      postgres-exporter:
        replicas: 1
        labels:
          app.kubernetes.io/component: postgres
        annotations:
          secret.reloader.stakater.com/reload: bug-bounty-exporter-database
        pod:
          labels:
            app.kubernetes.io/component: postgres
            bug-bounty.unbound-xi.org/workload: postgres
        containers:
          app:
            image:
              repository: quay.io/prometheuscommunity/postgres-exporter
              tag: v0.17.1@sha256:38606faa38c54787525fb0ff2fd6b41b4cfb75d455c1df294927c5f611699b17
              pullPolicy: IfNotPresent
            args:
              - --web.listen-address=:9187
            env:
              DATA_SOURCE_NAME:
                valueFrom:
                  secretKeyRef:
                    name: bug-bounty-exporter-database
                    key: BUG_BOUNTY_DATABASE_URL
            ports:
              - name: metrics
                containerPort: 9187
                protocol: TCP
            probes:
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: metrics
                  initialDelaySeconds: 2
                  periodSeconds: 10
                  timeoutSeconds: 2
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /metrics
                    port: metrics
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  timeoutSeconds: 2
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 64Mi
            securityContext:
              <<: *publicImageSecurityContext
              runAsGroup: 65534
              runAsUser: 65534

    defaultPodOptions:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

    service:
      api:
        controller: api
        labels:
          app.kubernetes.io/component: api
        ports:
          http:
            port: 8080
            targetPort: http
      api-metrics:
        controller: api
        labels:
          app.kubernetes.io/component: api
          bug-bounty.unbound-xi.org/metrics: "true"
        ports:
          metrics:
            port: 9090
            targetPort: metrics
      worker-metrics:
        controller: worker
        labels:
          app.kubernetes.io/component: worker
          bug-bounty.unbound-xi.org/metrics: "true"
        ports:
          metrics:
            port: 9090
            targetPort: metrics
      website:
        controller: website
        labels:
          app.kubernetes.io/component: website
        ports:
          http:
            port: 8080
            targetPort: http
      assets-proxy:
        controller: assets-proxy
        labels:
          app.kubernetes.io/component: assets-proxy
        ports:
          http:
            port: 8080
            targetPort: http
      object-store-proxy:
        controller: assets-proxy
        labels:
          app.kubernetes.io/component: assets-proxy
        ports:
          internal:
            port: 8081
            targetPort: internal
      postgres-exporter:
        controller: postgres-exporter
        labels:
          app.kubernetes.io/component: postgres
          bug-bounty.unbound-xi.org/metrics: "true"
        ports:
          metrics:
            port: 9187
            targetPort: metrics

    persistence:
      assets-proxy-config:
        type: configMap
        name: bug-bounty-assets-proxy
        advancedMounts:
          assets-proxy:
            app:
              - path: /etc/nginx/conf.d/default.conf
                subPath: default.conf
                readOnly: true
      assets-proxy-cache:
        type: emptyDir
        sizeLimit: 64Mi
        advancedMounts:
          assets-proxy:
            app:
              - path: /var/cache/nginx
      assets-proxy-tmp:
        type: emptyDir
        sizeLimit: 16Mi
        advancedMounts:
          assets-proxy:
            app:
              - path: /tmp
