---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bug-bounty-default-deny-ingress
  labels:
    app.kubernetes.io/part-of: bug-bounty
spec:
  podSelector:
    matchExpressions:
      - key: bug-bounty.unbound-xi.org/workload
        operator: In
        values:
          - api
          - worker
          - website
          - assets-proxy
          - postgres
  policyTypes:
    - Ingress
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: bug-bounty-edge-ingress
  labels:
    app.kubernetes.io/part-of: bug-bounty
spec:
  endpointSelector:
    matchExpressions:
      - key: bug-bounty.unbound-xi.org/workload
        operator: In
        values:
          - api
          - website
          - assets-proxy
  ingress:
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "8081"
              protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bug-bounty-private-metrics
  labels:
    app.kubernetes.io/part-of: bug-bounty
spec:
  podSelector:
    matchExpressions:
      - key: bug-bounty.unbound-xi.org/workload
        operator: In
        values:
          - api
          - worker
          - postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9187
