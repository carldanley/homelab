---
apiVersion: batch/v1
kind: Job
metadata:
  name: bug-bounty-bootstrap
  labels:
    app.kubernetes.io/name: bug-bounty-bootstrap
    app.kubernetes.io/part-of: bug-bounty
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bug-bounty-bootstrap
        app.kubernetes.io/part-of: bug-bounty
        bug-bounty.unbound-xi.org/workload: bootstrap
    spec:
      serviceAccountName: bug-bounty-bootstrap
      automountServiceAccountToken: false
      enableServiceLinks: false
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: git.r1p.dev/unbound-xi/bug-bounty-server:${BUG_BOUNTY_SERVER_VERSION}@${BUG_BOUNTY_SERVER_DIGEST}
          imagePullPolicy: IfNotPresent
          args:
            - bootstrap
          env:
            - name: BUG_BOUNTY_BOOTSTRAP_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bug-bounty-postgres-admin-database
                  key: BUG_BOUNTY_BOOTSTRAP_DATABASE_URL
            - name: BUG_BOUNTY_MIGRATOR_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bug-bounty-migrator-database
                  key: DATABASE_PASSWORD
            - name: BUG_BOUNTY_RUNTIME_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bug-bounty-runtime-database
                  key: DATABASE_PASSWORD
            - name: BUG_BOUNTY_EXPORTER_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bug-bounty-exporter-database
                  key: DATABASE_PASSWORD
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsGroup: 65532
            runAsNonRoot: true
            runAsUser: 65532
