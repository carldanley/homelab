---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: immich-secret
    template:
      data:
        DB_DATABASE_NAME: immich
        DB_HOSTNAME: immich-postgres-rw.media.svc.cluster.local
        DB_USERNAME: immich
        DB_PASSWORD: "{{ .IMMICH_POSTGRES_PASS }}"
        JWT_SECRET: "{{ .JWT_SECRET }}"
  dataFrom:
    - extract:
        key: immich
    - extract:
        key: immich-postgres
