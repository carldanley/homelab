---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: temporal
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      server:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: temporalio/auto-setup
              tag: 1.29.4.1@sha256:69e19e8aae1c1362f9fda86ad98624e8495b0330e4674c693a931b1f8ad9bce8
            env:
              DB: postgres12
              DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/dev-dynamic-config.yaml
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"

      ui:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: temporalio/ui
              tag: 2.48.2@sha256:8625626deb0b2447eff6fc81a1fba1d782c9e41e72d527016f1297a62e715241
            env:
              TEMPORAL_ADDRESS: &temporalAddress temporal-server:7233
              TEMPORAL_CORS_ORIGINS: http://localhost:3000

      admin-tools:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: temporalio/admin-tools
              tag: 1.30@sha256:2c2272b008f1af295b3719963e6feeef64f838d1105d895cf6acfcf96dd31741
            env:
              TEMPORAL_ADDRESS: *temporalAddress

    service:
      server:
        primary: true
        controller: server
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 10.50.100.4
        ports:
          http:
            port: 7233
      ui:
        controller: ui
        ports:
          http:
            port: &uiHttpPort 8080

    defaultPodOptions:
      hostUsers: false

    route:
      ui:
        hostnames:
          - "{{ .Release.Name }}.${DOMAIN_5}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: domain-5-subdomain-https
        rules:
          - backendRefs:
              - identifier: ui
                port: *uiHttpPort

    persistence:
      dynamic-config:
        type: configMap
        name: "{{ .Release.Name }}-configmap"
        advancedMounts:
          server:
            app:
            - path: /etc/temporal/config/dynamicconfig
