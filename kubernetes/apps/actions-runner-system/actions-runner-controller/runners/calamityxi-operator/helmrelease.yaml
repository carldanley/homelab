---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calamityxi-operator-runners
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
  values:
    githubConfigUrl: https://github.com/CalamityFFXI/operator
    githubConfigSecret: calamityxi-operator-runners-secret
    runnerScaleSetName: calamityxi-operator-runners
    minRunners: 1
    maxRunners: 2

    containerMode:
      type: kubernetes
      kubernetesModeWorkVolumeClaim:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        storageClassName: openebs-hostpath

    controllerServiceAccount:
      name: actions-runner-controller
      namespace: actions-runner-system

    template:
      spec:
        initContainers:
          - name: kube-init
            image: ghcr.io/home-operations/actions-runner:2.335.0@sha256:654a8934aec6160f6df20e9e1265a509c9b57b3956ee8446db66a183cea82da1
            command:
              - sudo
              - chown
              - -R
              - 1001:123
              - /home/runner/_work
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work

        containers:
          - name: runner
            image: ghcr.io/home-operations/actions-runner:2.335.0@sha256:654a8934aec6160f6df20e9e1265a509c9b57b3956ee8446db66a183cea82da1
            command:
              - /home/runner/run.sh
            env:
              - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
                value: "false"
              - name: NODE
                valueFrom:
                  fieldRef:
                    fieldPath: spec.nodeName
            volumeMounts:
              - name: hook-template
                mountPath: /home/runner/hook-template
                readOnly: true
        volumes:
          - name: hook-template
            configMap:
              name: calamityxi-operator-hook-template

        serviceAccountName: calamityxi-operator-runners
