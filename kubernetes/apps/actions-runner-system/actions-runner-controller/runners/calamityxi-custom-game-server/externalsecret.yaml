---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: calamityxi-custom-game-server-runners
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: calamityxi-custom-game-server-runners-secret
  data:
    - secretKey: github_app_id
      remoteRef:
        key: &name calamityxi-arc-runners
        property: app-id
    - secretKey: github_app_installation_id
      remoteRef:
        key: *name
        property: app-installation-id
    - secretKey: github_app_private_key
      remoteRef:
        key: *name
        property: app-private-key
        decodingStrategy: Base64
