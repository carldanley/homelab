---
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: alertmanager
spec:
  route:
    groupBy:
      - alertname
      - cluster
      - job
    groupInterval: 5m
    groupWait: 1m
    receiver: discord-homelab-alerts
    repeatInterval: 12h
    routes:
      - receiver: "null"
        matchers:
          - name: alertname
            value: InfoInhibitor
            matchType: "="
      - receiver: discord-homelab-alerts
        matchers:
          - name: discord_channel
            value: homelab-alerts
            matchType: "="
  inhibitRules:
    - equal:
        - alertname
        - namespace
      sourceMatch:
        - name: severity
          value: critical
          matchType: "="
      targetMatch:
        - name: severity
          value: warning
          matchType: "="
  receivers:
    - name: "null"
    - name: discord-homelab-alerts
      discordConfigs:
        - apiURL:
            name: alertmanager-discord-webhooks
            key: homelab-alerts
          sendResolved: true
