---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: smartctl-exporter
spec:
  groups:
    - name: smartctl-exporter.rules
      rules:
        - alert: SmartDeviceHighTemperature
          expr: |
            smartctl_device_temperature > 65
          for: 5m
          annotations:
            summary: >-
              Mounted drive {{ $labels.device }} on device {{ $labels.instance }} has a temperature higher than {{ $value }}°C
          labels:
            severity: critical

        - alert: SmartDeviceTestFailed
          expr: |
            (smartctl_device_smart_status != 1 or smartctl_device_status != 1)
          for: 5m
          annotations:
            summary: >-
              Mounted drive {{ $labels.device }} on device {{ $labels.instance }} did not pass its SMART test
          labels:
            severity: critical

        - alert: SmartDeviceCriticalWarning
          expr: |
            smartctl_device_critical_warning != 0
          for: 5m
          annotations:
            summary: >-
              Mounted drive {{ $labels.device }} on device {{ $labels.instance }} is in a critical state
          labels:
            severity: critical

        - alert: SmartDeviceMediaErrors
          expr: |
            smartctl_device_media_errors != 0
          for: 5m
          annotations:
            summary: >-
              Mounted drive {{ $labels.device }} on device {{ $labels.instance }} has media errors
          labels:
            severity: critical

        - alert: SmartDeviceAvailableSpareUnderThreadhold
          expr: |
            smartctl_device_available_spare_threshold > smartctl_device_available_spare
          for: 5m
          annotations:
            summary: >-
              Device {{ $labels.device }} on instance {{ $labels.instance }} is under available spare threshold
          labels:
            severity: critical

        - alert: SmartDeviceNvmeWearHigh
          expr: |
            (
              smartctl_device_percentage_used >= 80
              and smartctl_device_percentage_used < 100
            )
            * on(instance, device, namespace, service, endpoint, container)
              group_left(model_name, serial_number)
              smartctl_device
          for: 1h
          annotations:
            summary: >-
              NVMe drive {{ $labels.device }} on instance {{ $labels.instance }} is {{ $value }}% worn
            description: >-
              {{ $labels.model_name }} serial {{ $labels.serial_number }} has consumed {{ $value }}% of its vendor-estimated endurance.
          labels:
            severity: warning

        - alert: SmartDeviceNvmeWearCritical
          expr: |
            (smartctl_device_percentage_used >= 100)
            * on(instance, device, namespace, service, endpoint, container)
              group_left(model_name, serial_number)
              smartctl_device
          for: 15m
          annotations:
            summary: >-
              NVMe drive {{ $labels.device }} on instance {{ $labels.instance }} has exceeded its endurance estimate
            description: >-
              {{ $labels.model_name }} serial {{ $labels.serial_number }} reports {{ $value }}% used. Plan replacement, especially for control-plane OS disks.
          labels:
            severity: critical

        - alert: SmartDeviceInterfaceSlow
          expr: |
            smartctl_device_interface_speed{speed_type="current"} != on(device, instance, namespace, pod) smartctl_device_interface_speed{speed_type="max"}
          annotations:
            summary: >-
              Device {{ $labels.device }} on instance {{ $labels.instance }} interface is slower than it should be
          for: 5m
          labels:
            severity: critical
