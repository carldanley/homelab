---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: fluent-bit
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.55.0
  url: oci://ghcr.io/home-operations/charts-mirror/fluent-bit
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fluent-bit
spec:
  chartRef:
    kind: OCIRepository
    name: fluent-bit
  interval: 1h
  values:
    config:
      service: |-
        [SERVICE]
          daemon off
          flush {{ .Values.flush }}
          log_level {{ .Values.logLevel }}
          parsers_file /fluent-bit/etc/parsers.conf
          parsers_file /fluent-bit/etc/conf/custom_parsers.conf
          http_server on
          http_listen 0.0.0.0
          http_port {{ .Values.metricsPort }}
          health_check on

      inputs: |-
        [INPUT]
          name tail
          alias kubernetes
          path /var/log/containers/*.log
          parser containerd
          tag kubernetes.*
          skip_empty_lines on
          skip_long_lines on

      filters: |-
        [FILTER]
          name kubernetes
          match kubernetes.*
          merge_log on
          kube_tag_prefix kubernetes.var.log.containers.
          k8s-logging.parser on
          k8s-logging.exclude on
          namespace_labels off
          annotations off

        [FILTER]
          name nest
          match kubernetes.*
          operation lift
          nested_under kubernetes
          add_prefix k_

        [FILTER]
          name nest
          match kubernetes.*
          operation lift
          nested_under k_labels
          add_prefix k_labels_

        [FILTER]
          name modify
          match kubernetes.*
          rename k_labels_app.kubernetes.io/name app
          rename k_labels_app app
          rename k_labels_k8s-app app

        [FILTER]
          name parser
          match kubernetes.var.log.containers.gitea-*
          key_name log
          parser gitea_ssh_auth_failure
          reserve_data on
          preserve_key on

        [FILTER]
          name log_to_metrics
          match kubernetes.var.log.containers.gitea-*
          tag gitea_ssh_metrics
          metric_mode counter
          metric_namespace gitea
          metric_subsystem ssh
          metric_name failed_authentications
          metric_description Gitea SSH failed authentication attempts
          regex k_namespace_name ^selfhosted$
          regex app ^gitea$
          regex log ^.*Failed authentication attempt from .*$
          label_field remote_ip

      customParsers: |-
        [PARSER]
          name containerd
          format regex
          regex ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
          time_key time
          time_format %Y-%m-%dT%H:%M:%S.%L%z

        [PARSER]
          name gitea_ssh_auth_failure
          format regex
          regex ^.*Failed authentication attempt from (?<remote_ip>(?:[0-9]{1,3}\.){3}[0-9]{1,3}|\[[0-9A-Fa-f:]+\])(?::[0-9]+)?.*$

      outputs: |-
        [OUTPUT]
          name http
          match kubernetes.*
          host victoria-logs-server.observability.svc.cluster.local
          port 9428
          uri /insert/jsonline?_stream_fields=stream,k_namespace_name,k_pod_name,app&_msg_field=log&_time_field=date
          format json_lines
          json_date_format iso8601
          compress gzip
          log_response_payload false

        [OUTPUT]
          name prometheus_exporter
          match gitea_ssh_metrics
          host 0.0.0.0
          port 2021

    extraPorts:
      - name: ssh-metrics
        port: 2021
        containerPort: 2021
        protocol: TCP

    serviceMonitor:
      enabled: true
      additionalEndpoints:
        - port: ssh-metrics
          path: /metrics
