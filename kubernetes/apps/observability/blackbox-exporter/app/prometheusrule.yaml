---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: blackbox-exporter
spec:
  groups:
    - name: blackbox-exporter.rules
      rules:
        - alert: BlackboxInstanceDown
          expr: |
            probe_success == 0
          for: 5m
          annotations:
            summary: >-
              The host {{ $labels.instance }} is down
          labels:
            severity: critical

        - alert: PlexUnavailableOnTrueNAS
          expr: |
            probe_success{instance="http://nas.batcave:32400/identity"} == 0
          for: 5m
          annotations:
            summary: >-
              Plex on TrueNAS is unavailable
            description: >-
              The Kubernetes blackbox probe cannot get a healthy response from Plex at
              http://nas.batcave:32400/identity. TrueNAS may be reachable while its
              Apps/Docker service or Plex container is down.
          labels:
            severity: critical

        - alert: UniFiUILatencyHigh
          expr: |
            probe_duration_seconds{instance="https://unifi.batcave/"} > 2
          for: 10m
          annotations:
            summary: >-
              UniFi UI is responding slowly
            description: >-
              The blackbox HTTPS probe for https://unifi.batcave/ has taken
              longer than two seconds for 10 minutes. This catches app-layer
              slowness when ICMP still looks healthy.
          labels:
            severity: warning
