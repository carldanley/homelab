---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: grafana
spec:
  config:
    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      reporting_enabled: "false"
    auth.anonymous:
      enabled: "false"
    auth.generic_oauth:
      allow_sign_up: "true"
      api_url: "https://auth.${DOMAIN_7}/application/o/userinfo/"
      auth_url: "https://auth.${DOMAIN_7}/application/o/authorize/"
      enabled: "true"
      name: authentik
      role_attribute_strict: "true"
      scopes: openid profile email
      skip_org_role_sync: "false"
      token_url: "https://auth.${DOMAIN_7}/application/o/token/"
      use_pkce: "true"
    date_formats:
      use_browser_locale: "true"
    explore:
      enabled: "true"
    log:
      mode: console
    metrics:
      enabled: "true"
    news:
      news_feed_enabled: "false"
    plugins:
      plugin_admin_enabled: "false"
    security:
      angular_support_enabled: "true"
      cookie_secure: "true"
    server:
      enable_gzip: "true"
      root_url: "https://grafana.${DOMAIN_7}"
  service:
    metadata:
      labels:
        dashboards: grafana
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        metadata:
          annotations:
            secret.reloader.stakater.com/reload: grafana-secret
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: admin-user
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: admin-password
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: oauth-client-id
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: oauth-client-secret
                - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: oauth-role-attribute-path
                - name: GF_INSTALL_PLUGINS
                  value: fetzerch-sunandmoon-datasource
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          volumes:
            - name: grafana-data
              persistentVolumeClaim:
                claimName: grafana-pvc
  httpRoute:
    spec:
      hostnames:
        - "grafana.${DOMAIN_7}"
      parentRefs:
        - name: external
          namespace: kube-system
          sectionName: domain-7-subdomain-https
        - name: internal
          namespace: kube-system
          sectionName: domain-7-subdomain-https
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: ceph-block
  disableDefaultSecurityContext: All
