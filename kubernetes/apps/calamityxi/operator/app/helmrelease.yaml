---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: operator
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: calamityxi
    namespace: flux-system
  values:
    image:
      repository: ghcr.io/calamityffxi/operator
      tag: v0.1.12

    replicaCount: 1

    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        memory: 512Mi

    leaderElect: true

    podLabels:
      environment: ci

    imagePullSecrets:
      - name: calamityxi-ghcr-secret
