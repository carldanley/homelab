---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: calamityxi-mariadb-early-access
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: calamityxi-mariadb-early-access-secret
    template:
      data:
        ROOT_PASSWORD: "{{ .MARIADB_ROOT_PASSWORD }}"
        S3_ACCESS_KEY_ID: "{{ .S3_ACCESS_KEY_ID }}"
        S3_SECRET_ACCESS_KEY: "{{ .S3_SECRET_ACCESS_KEY }}"
        USER_CALAMITYXI_PASSWORD: "{{ .USER_CALAMITYXI_PASSWORD }}"
  dataFrom:
    - extract:
        key: calamityxi-mariadb-early-access
