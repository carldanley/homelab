---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: early-access-game-server-world
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:

      world:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          wait-for-bootstrap:
            image:
              repository: ghcr.io/calamityffxi/game-server
              tag: 2026.03.16-2
            envFrom:
              - secretRef:
                  name: "early-access-game-server-common-credentials-secret"
            args:
              - /bin/bash
              - /scripts/wait-for-bootstrap.sh
        containers:
          app:
            image:
              repository: ghcr.io/calamityffxi/game-server
              tag: 2026.03.16-2
            env:
              - name: XI_NETWORK_ZMQ_IP
                value: "0.0.0.0"
            envFrom:
              - secretRef:
                  name: "early-access-game-server-common-credentials-secret"
            args:
              - /server/xi_world
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 2Gi
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 10
              readiness:
                enabled: true
                spec:
                  periodSeconds: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5

    defaultPodOptions:
      hostUsers: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      imagePullSecrets:
        - name: early-access-game-server-common-ghcr-secret

    service:
      app:
        ports:
          zmq:
            port: 54003

    persistence:
      config-file:
        type: configMap
        name: early-access-game-server-common-configmap
        globalMounts:
          - path: /scripts
            readOnly: true
      settings:
        type: configMap
        name: early-access-game-server-settings
        globalMounts:
          - path: /server/settings/default
            readOnly: true
