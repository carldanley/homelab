---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: early-access-game-server-bootstrap
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:

      bootstrap:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/calamityffxi/custom-game-server
              tag: v0.1.12
            envFrom:
              - secretRef:
                  name: "early-access-game-server-common-credentials-secret"
            args:
              - /bin/bash
              - /scripts/bootstrap.sh
            resources:
              requests:
                cpu: 250m
                memory: 256Mi
              limits:
                memory: 1Gi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["/bin/sh", "-c", "test -f /tmp/bootstrap-ready"]
                    periodSeconds: 5
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["/bin/sh", "-c", "test -f /tmp/bootstrap-ready"]
                    periodSeconds: 5

    defaultPodOptions:
      hostUsers: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      imagePullSecrets:
        - name: early-access-game-server-common-ghcr-secret

    persistence:
      config-file:
        type: configMap
        name: early-access-game-server-bootstrap-configmap
        globalMounts:
          - path: /scripts
            readOnly: true
