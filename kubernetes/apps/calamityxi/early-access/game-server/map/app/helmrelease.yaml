---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: early-access-game-server-map
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:

      map:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          wait-for-bootstrap:
            image:
              repository: ghcr.io/calamityffxi/custom-game-server
              tag: v0.1.1
            envFrom:
              - secretRef:
                  name: "early-access-game-server-common-credentials-secret"
            args:
              - /bin/bash
              - /scripts/wait-for-bootstrap.sh
          wait-for-world:
            image:
              repository: ghcr.io/calamityffxi/custom-game-server
              tag: v0.1.1
            env:
              - name: XI_NETWORK_ZMQ_IP
                value: &zmqIP early-access-game-server-world
            envFrom:
              - secretRef:
                  name: "early-access-game-server-common-credentials-secret"
            args:
              - /bin/sh
              - /scripts/wait-for-world.sh
          seed-meshes:
            image:
              repository: ghcr.io/landsandboat/ximeshes
              tag: latest
            envFrom:
              - secretRef:
                  name: "early-access-game-server-common-credentials-secret"
            args:
              - /bin/sh
              - /scripts/seed-meshes.sh
        containers:
          app:
            image:
              repository: ghcr.io/calamityffxi/custom-game-server
              tag: v0.1.1
            env:
              - name: XI_NETWORK_ZMQ_IP
                value: *zmqIP
            envFrom:
              - secretRef:
                  name: "early-access-game-server-common-credentials-secret"
            args:
              - /server/xi_map
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
              limits:
                memory: 8Gi

    defaultPodOptions:
      hostUsers: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      imagePullSecrets:
        - name: early-access-game-server-common-ghcr-secret

    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/sharing-key: calamityxi-early-access-game-server
          lbipam.cilium.io/ips: 10.50.100.30
        ports:
          map:
            port: 54230
            protocol: UDP

    persistence:
      config-file:
        type: configMap
        name: early-access-game-server-common-configmap
        globalMounts:
          - path: /scripts
            readOnly: true
      losmeshes:
        type: emptyDir
        globalMounts:
          - path: /server/losmeshes
      navmeshes:
        type: emptyDir
        globalMounts:
          - path: /server/navmeshes
      settings:
        type: configMap
        name: early-access-game-server-settings
        globalMounts:
          - path: /server/settings/default
            readOnly: true
