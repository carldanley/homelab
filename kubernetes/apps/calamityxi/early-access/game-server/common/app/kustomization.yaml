---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./dnsendpoint.yaml
  - ./externalsecret.yaml
  - ./issuer.yaml
configMapGenerator:
  - name: early-access-game-server-common-configmap
    files:
      - ./scripts/wait-for-bootstrap.sh
      - ./scripts/wait-for-world.sh
      - ./scripts/seed-meshes.sh
  - name: early-access-game-server-settings
    files:
      - ./settings/logging.lua
      - ./settings/login.lua
      - ./settings/main.lua
      - ./settings/map.lua
      - ./settings/network.lua
      - ./settings/search.lua
      - ./settings/test.lua
generatorOptions:
  disableNameSuffixHash: true
