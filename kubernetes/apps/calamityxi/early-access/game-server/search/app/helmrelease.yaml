---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: early-access-game-server-search
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:

      search:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          wait-for-bootstrap:
            image:
              repository: ghcr.io/calamityffxi/custom-game-server
              tag: v0.1.7
            envFrom:
              - secretRef:
                  name: "early-access-game-server-common-credentials-secret"
            args:
              - /bin/bash
              - /scripts/wait-for-bootstrap.sh
        containers:
          app:
            image:
              repository: ghcr.io/calamityffxi/custom-game-server
              tag: v0.1.7
            env:
              - name: XI_NETWORK_ZMQ_IP
                value: early-access-game-server-world
            envFrom:
              - secretRef:
                  name: "early-access-game-server-common-credentials-secret"
            args:
              - /server/xi_search
            resources:
              requests:
                cpu: 250m
                memory: 256Mi
              limits:
                memory: 512Mi
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 10
              readiness:
                enabled: true
                spec:
                  periodSeconds: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5

    defaultPodOptions:
      hostUsers: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      imagePullSecrets:
        - name: early-access-game-server-common-ghcr-secret

    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/sharing-key: calamityxi-early-access-game-server
          lbipam.cilium.io/ips: 10.50.100.30
        ports:
          search:
            port: 54002

    persistence:
      config-file:
        type: configMap
        name: early-access-game-server-common-configmap
        globalMounts:
          - path: /scripts
            readOnly: true
