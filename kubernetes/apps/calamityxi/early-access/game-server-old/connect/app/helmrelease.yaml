---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: early-access-game-server-connect
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:

      connect:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          wait-for-bootstrap:
            image:
              repository: ghcr.io/calamityffxi/custom-game-server
              tag: v0.1.19
            envFrom:
              - secretRef:
                  name: "early-access-game-server-common-credentials-secret"
            args:
              - /bin/bash
              - /scripts/wait-for-bootstrap.sh
          wait-for-world:
            image:
              repository: ghcr.io/calamityffxi/custom-game-server
              tag: v0.1.19
            env:
              - name: XI_NETWORK_ZMQ_IP
                value: &zmqIP early-access-game-server-world
            envFrom:
              - secretRef:
                  name: "early-access-game-server-common-credentials-secret"
            args:
              - /bin/bash
              - /scripts/wait-for-world.sh
        containers:
          app:
            image:
              repository: ghcr.io/calamityffxi/custom-game-server
              tag: v0.1.19
            env:
              - name: XI_NETWORK_ZMQ_IP
                value: *zmqIP
            envFrom:
              - secretRef:
                  name: "early-access-game-server-common-credentials-secret"
            args:
              - /server/xi_connect
            resources:
              requests:
                cpu: 250m
                memory: 256Mi
              limits:
                memory: 512Mi
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["/bin/sh", "-c", "echo | openssl s_client -connect 127.0.0.1:54231 -brief >/dev/null 2>&1"]
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["/bin/sh", "-c", "echo | openssl s_client -connect 127.0.0.1:54231 -brief >/dev/null 2>&1"]
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["/bin/sh", "-c", "echo | openssl s_client -connect 127.0.0.1:54231 -brief >/dev/null 2>&1"]

    defaultPodOptions:
      hostUsers: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      imagePullSecrets:
        - name: early-access-game-server-common-ghcr-secret

    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/sharing-key: calamityxi-early-access-game-server
          lbipam.cilium.io/ips: 10.50.100.30
        ports:
          view:
            port: 54001
          data:
            port: 54230
          auth:
            port: 54231

    persistence:
      config-file:
        type: configMap
        name: early-access-game-server-common-configmap
        globalMounts:
          - path: /scripts
            readOnly: true
      tls-certs:
        type: secret
        name: "{{ .Release.Name }}-tls"
        advancedMounts:
          connect:
            app:
              - path: /server/login.cert
                subPath: tls.crt
                readOnly: true
              - path: /server/login.key
                subPath: tls.key
                readOnly: true
