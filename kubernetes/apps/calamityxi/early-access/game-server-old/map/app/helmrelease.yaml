---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: early-access-game-server-map
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:

      map:
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          wait-for-bootstrap:
            image:
              repository: ghcr.io/calamityffxi/custom-game-server
              tag: v0.1.19
            envFrom:
              - secretRef:
                  name: &envSecret "early-access-game-server-common-credentials-secret"
            args:
              - /bin/bash
              - /scripts/wait-for-bootstrap.sh
          wait-for-world:
            image:
              repository: ghcr.io/calamityffxi/custom-game-server
              tag: v0.1.19
            env:
              - name: XI_NETWORK_ZMQ_IP
                value: &zmqIP early-access-game-server-world
            envFrom:
              - secretRef:
                  name: *envSecret
            args:
              - /bin/sh
              - /scripts/wait-for-world.sh
        containers:
          app:
            image:
              repository: ghcr.io/calamityffxi/custom-game-server
              tag: v0.1.19
            env:
              - name: XI_NETWORK_ZMQ_IP
                value: *zmqIP
              - name: XI_NETWORK_MAP_PORT
                value: &mapPort 54230
              - name: XI_NETWORK_MAP_HEARTBEAT_TARGET
                value: &unixSocket "unix:///status/heartbeat.sock"
            envFrom:
              - secretRef:
                  name: *envSecret
            args:
              - /server/xi_map
            resources:
              requests:
                cpu: 1000m
                memory: 2Gi
              limits:
                memory: 4Gi
          heartbeat:
            image:
              repository: ghcr.io/calamityffxi/map-heartbeat-sidecar
              tag: v0.1.0
            env:
              - name: XI_NETWORK_MAP_PORT
                value: *mapPort
              - name: XI_NETWORK_MAP_HEARTBEAT_TARGET
                value: *unixSocket
              - name: DOWNSTREAM_STATUS_URL
                value: http://api-server:8080/v1/server/map-status-reports
            envFrom:
              - secretRef:
                  name: *envSecret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/live
                    port: &httpPort 8080
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/ready
                    port: *httpPort
                  periodSeconds: 5
                  timeoutSeconds: 2
                  failureThreshold: 3

    defaultPodOptions:
      hostUsers: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      imagePullSecrets:
        - name: early-access-game-server-common-ghcr-secret

    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/sharing-key: calamityxi-early-access-game-server
          lbipam.cilium.io/ips: 10.50.100.30
        ports:
          map:
            port: *mapPort
            protocol: UDP

    persistence:
      config-file:
        type: configMap
        name: early-access-game-server-common-configmap
        globalMounts:
          - path: /scripts
            readOnly: true
      status:
        type: emptyDir
        globalMounts:
          - path: /status
