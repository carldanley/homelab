---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: api-server
  namespace: calamityxi
spec:
  groups:
    - name: api-server.availability
      rules:
        - alert: APIServerMetricsAbsent
          expr: |-
            absent(calamityxi_api_server_build_info{namespace="calamityxi"})
          for: 5m
          labels:
            severity: critical
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server metrics are absent
            description: >-
              Prometheus has not scraped api-server metrics in calamityxi for
              five minutes. Check the ServiceMonitor, Service, pod readiness,
              and /metrics handler before trusting the dashboard.
        - alert: APIServerScrapeDown
          expr: |-
            up{namespace="calamityxi",service="api-server"} == 0
          for: 2m
          labels:
            severity: critical
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server metrics scrape is down
            description: >-
              Prometheus cannot scrape {{ $labels.namespace }}/{{ $labels.service }}.
        - alert: APIServerMissingReplicas
          expr: |-
            kube_deployment_status_replicas_available{namespace="calamityxi",deployment="api-server"} < on(namespace, deployment) kube_deployment_spec_replicas{namespace="calamityxi",deployment="api-server"}
          for: 5m
          labels:
            severity: critical
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server is missing ready replicas
            description: >-
              Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has
              fewer available replicas than requested.
    - name: api-server.http
      rules:
        - alert: APIServerHTTP5xxRateHigh
          expr: |-
            (
              sum(rate(calamityxi_api_server_http_requests_total{namespace="calamityxi",route!="/metrics",status_class="5xx"}[5m]))
              /
              clamp_min(sum(rate(calamityxi_api_server_http_requests_total{namespace="calamityxi",route!="/metrics"}[5m])), 1)
            ) > 0.05
          for: 10m
          labels:
            severity: warning
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server HTTP 5xx rate is elevated
            description: >-
              More than 5 percent of non-metrics API requests are returning 5xx
              responses for ten minutes.
        - alert: APIServerHTTPLatencyHigh
          expr: |-
            histogram_quantile(
              0.95,
              sum by (le) (
                rate(calamityxi_api_server_http_request_duration_seconds_bucket{namespace="calamityxi",route!~"/metrics|/v1/server/events/.*"}[5m])
              )
            ) > 0.5
          for: 10m
          labels:
            severity: warning
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server HTTP latency p95 is high
            description: >-
              API p95 latency is above 500ms for ten minutes, excluding metrics
              scrapes and long-lived SSE routes.
        - alert: APIServerMapHeartbeatTrafficHigh
          expr: |-
            sum(rate(calamityxi_api_server_http_requests_total{namespace="calamityxi",route="/v1/server/map-status-reports"}[5m])) > 10
          for: 15m
          labels:
            severity: warning
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server map heartbeat traffic is high
            description: >-
              Map heartbeat ingestion is above 10 RPS for fifteen minutes. The
              change-plus-lease sidecar should normally keep this near 4 RPS in
              the current homelab shard count, so this probably means the noisy
              old sidecar behavior is still deployed or some damn retry loop is
              misbehaving.
    - name: api-server.sse
      rules:
        - alert: APIServerSSEConnectionsNearLimit
          expr: |-
            max(
              sum by (namespace, instance) (calamityxi_api_server_sse_connections{namespace="calamityxi"})
              /
              clamp_min(max by (namespace, instance) (calamityxi_api_server_sse_connection_limit{namespace="calamityxi"}), 1)
            ) > 0.80
          for: 10m
          labels:
            severity: warning
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server SSE connections are near the per-pod cap
            description: >-
              One api-server pod has had active SSE connections above 80% of
              its configured shared SSE connection limit for ten minutes.
        - alert: APIServerSSEConnectionsAtLimit
          expr: |-
            max(
              sum by (namespace, instance) (calamityxi_api_server_sse_connections{namespace="calamityxi"})
              /
              clamp_min(max by (namespace, instance) (calamityxi_api_server_sse_connection_limit{namespace="calamityxi"}), 1)
            ) > 0.95
          for: 5m
          labels:
            severity: critical
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server SSE connections are at the per-pod cap
            description: >-
              One api-server pod has had active SSE connections above 95% of
              its configured shared SSE connection limit for five minutes.
        - alert: APIServerSSEConnectionsRejected
          expr: |-
            sum(rate(calamityxi_api_server_sse_connections_total{namespace="calamityxi",result="rejected"}[5m])) > 0
          for: 5m
          labels:
            severity: warning
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server is rejecting SSE connections
            description: >-
              The API has returned SSE capacity 503s for five minutes. Clients
              will retry, but the stream cap is full and needs attention before
              this turns into reconnect churn.
        - alert: APIServerSSEWriteFailures
          expr: |-
            sum(rate(calamityxi_api_server_sse_write_failures_total{namespace="calamityxi"}[5m])) > 0
          for: 10m
          labels:
            severity: warning
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server SSE writes are failing
            description: >-
              SSE writes or flushes have failed for ten minutes. This usually
              means slow clients, closed connections, or a proxy path doing
              something unhelpful.
        - alert: APIServerSSEDroppedStatusUpdates
          expr: |-
            sum(rate(calamityxi_api_server_sse_dropped_updates_total{namespace="calamityxi",stream="status"}[5m])) > 0
          for: 5m
          labels:
            severity: warning
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server status SSE subscribers are falling behind
            description: >-
              Status SSE subscriber queues are dropping compact updates and
              needing full snapshot repair for five minutes. That is exactly the
              guardrail doing its job, but it still means clients or network
              paths are too damn slow.
        - alert: APIServerSSEOutboundBandwidthHigh
          expr: |-
            sum(rate(calamityxi_api_server_sse_bytes_total{namespace="calamityxi"}[5m])) > 1048576
          for: 10m
          labels:
            severity: warning
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server SSE outbound bandwidth is unusually high
            description: >-
              SSE outbound traffic has stayed above 1 MiB/s for ten minutes.
              Check connection counts and event rates before this becomes an
              avoidable bandwidth problem.
    - name: api-server.status
      rules:
        - alert: APIServerComponentUnavailable
          expr: |-
            max by (component, status) (
              calamityxi_api_server_component_status{namespace="calamityxi",component=~"api|world|connect|search",status=~"offline|unknown"}
            ) > 0
          for: 5m
          labels:
            severity: critical
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server core component is unavailable
            description: >-
              The compact status snapshot has reported {{ $labels.component }}
              as {{ $labels.status }} for five minutes.
        - alert: APIServerComponentDegraded
          expr: |-
            max by (component) (
              calamityxi_api_server_component_status{namespace="calamityxi",component=~"api|world|connect|search",status="degraded"}
            ) > 0
          for: 10m
          labels:
            severity: warning
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server core component is degraded
            description: >-
              The compact status snapshot has reported {{ $labels.component }}
              as degraded for ten minutes.
        - alert: APIServerPublicShardsUnhealthy
          expr: |-
            sum(calamityxi_api_server_public_shards{namespace="calamityxi",health=~"degraded|offline"}) > 0
          for: 5m
          labels:
            severity: critical
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              one or more public shards are unhealthy
            description: >-
              The API status snapshot reports degraded or offline public shards.
              Check map heartbeat age, map pods, and route-state before players
              trip over this crap.
        - alert: APIServerPrivateShardsUnhealthy
          expr: |-
            sum(calamityxi_api_server_private_shards{namespace="calamityxi",health=~"degraded|offline"}) > 0
          for: 5m
          labels:
            severity: warning
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              one or more private shards are unhealthy
            description: >-
              The API status snapshot reports degraded or offline private
              shards for five minutes.
        - alert: APIServerStatusSnapshotStale
          expr: |-
            max(calamityxi_api_server_status_snapshot_age_seconds{namespace="calamityxi"}) > 60
          for: 5m
          labels:
            severity: warning
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server status snapshot is stale
            description: >-
              The compact status snapshot has been older than 60 seconds for
              five minutes. The status refresh path is lagging or busted.
        - alert: APIServerPlayerCountStale
          expr: |-
            max(calamityxi_api_server_player_count_stale{namespace="calamityxi"}) > 0
          for: 5m
          labels:
            severity: warning
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              api-server player count is stale
            description: >-
              The status hydration player count has been stale for five
              minutes.
    - name: api-server.launcher-telemetry
      rules:
        - alert: APIServerLauncherErrorEventsHigh
          expr: |-
            sum(rate(calamityxi_launcher_error_events_total{namespace="calamityxi"}[10m])) > 0.1
          for: 15m
          labels:
            severity: warning
            discord_channel: calamity-api-server
          annotations:
            summary: >-
              launcher error telemetry is elevated
            description: >-
              Launcher clients are reporting more than 0.1 bounded error events
              per second for fifteen minutes.
