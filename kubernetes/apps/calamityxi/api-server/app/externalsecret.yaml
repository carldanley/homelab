---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-server-ghcr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: api-server-ghcr-secret
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ .DOCKER_CONFIG_JSON }}"
  dataFrom:
    - extract:
        key: github-pat-calamityxi-private-images
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-server-game-server-database
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: api-server-game-server-database-secret
    template:
      data:
        GAME_SERVER_DB_ADDR: "early-access-mariadb-internal:3306"
        GAME_SERVER_DB_DATABASE: "early-access-mariadb"
        GAME_SERVER_DB_USER: "calamityxi-early-access"
        GAME_SERVER_DB_PASSWORD: "{{ .USER_PASSWORD }}"
  dataFrom:
    - extract:
        key: calamityxi-mariadb-early-access
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-server-database
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: api-server-database-secret
    template:
      data:
        API_SERVER_DB_ADDR: "api-server-mariadb-internal:3306"
        API_SERVER_DB_DATABASE: "api-server-mariadb"
        API_SERVER_DB_USER: "calamityxi-api-server"
        API_SERVER_DB_PASSWORD: "{{ .USER_PASSWORD }}"
  dataFrom:
    - extract:
        key: calamityxi-mariadb-api-server
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: api-server-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: api-server-config-secret
    template:
      data:
        # Valkey
        VALKEY_ADDR: "valkey:6379"

        # Game Server login/search/world service addresses
        LSB_LOGIN_AUTH_ADDR: "10.50.100.30:54231"
        LSB_SEARCH_ADDR: "10.50.100.30:54002"
        LSB_WORLD_ADDR: "10.50.100.30:54003"
        STATUS_WORLD_ADMIN_URL: "http://cxi-world:8088"
        STATUS_CONNECT_ADMIN_URL: "http://cxi-connect-admin:8088"
        STATUS_SEARCH_ADMIN_URL: "http://cxi-search-admin:8088"
        STATUS_SEARCH_WORKER_ADMIN_URL: "http://cxi-search-worker-admin:8088"
        STATUS_PROMETHEUS_BASE_URL: "http://kube-prometheus-stack-prometheus.observability.svc:9090"
        MAP_HEARTBEAT_BEARER_TOKEN: "{{ .MAP_HEARTBEAT_BEARER_TOKEN }}"

        # Discord bot configuration
        DISCORD_BOT_BEARER_TOKEN: "{{ .DISCORD_BOT_BEARER_TOKEN }}"

        # Resend email service configuration
        RESEND_API_KEY: "{{ .RESEND_API_KEY }}"
        RESEND_FROM: "{{ .RESEND_FROM }}"
        RESEND_REPLY_TO: "{{ .RESEND_REPLY_TO }}"
        RESEND_BASE_URL: "{{ .RESEND_BASE_URL }}"
  dataFrom:
    - extract:
        key: calamityxi-mariadb-early-access
    - extract:
        key: calamityxi-resend
    - extract:
        key: calamityxi-map-sidecar
    - extract:
        key: calamityxi-discord-bot
