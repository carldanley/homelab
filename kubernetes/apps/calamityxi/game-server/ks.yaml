---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app game-server
  namespace: &namespace calamityxi
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: cert-manager-secrets
      namespace: cert-manager
    - name: early-access-mariadb
      namespace: *namespace
    - name: valkey
      namespace: *namespace
    - name: operator
      namespace: *namespace
  healthChecks:
    - apiVersion: runtime.calamityxi.io/v1alpha1
      kind: CalamityXICluster
      name: cxi
      namespace: *namespace
  healthCheckExprs:
    - apiVersion: runtime.calamityxi.io/v1alpha1
      kind: CalamityXICluster
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
  interval: 1h
  path: ./kubernetes/apps/calamityxi/game-server/app
  postBuild:
    substituteFrom:
      - kind: Secret
        name: domains-secret
        optional: false
    substitute:
      APP: *app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
