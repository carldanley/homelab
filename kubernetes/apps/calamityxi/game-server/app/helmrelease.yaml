---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: game-server
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: calamityxi-game-server
    namespace: flux-system
  values:
    image:
      repository: ghcr.io/calamityffxi/custom-game-server
      tag: v0.1.20
      pullPolicy: IfNotPresent

    secrets:
      credentialsSecretName: early-access-game-server-common-credentials-secret
      imagePullSecretName: early-access-game-server-common-ghcr-secret
      connectTlsSecretName: early-access-game-server-connect-tls

    network:
      serviceLoadBalancerIP: 10.50.100.30
      loadBalancerSharingKey: calamityxi-early-access-game-server

    connect:
      startup:
        worldReadyDelaySeconds: 20
        restartOnWorldDisconnect:
          enabled: true
          checkIntervalSeconds: 2
          failureThreshold: 2
      resources:
        requests:
          cpu: "250m"
          memory: "256Mi"
        limits:
          memory: "512Mi"
    search:
      resources:
        requests:
          cpu: "250m"
          memory: "256Mi"
        limits:
          memory: "512Mi"
    world:
      startup:
        readyDelaySeconds: 20
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          memory: "1Gi"

    tools:
      enabled: true
      resources:
        requests:
          cpu: "250m"
          memory: "256Mi"
        limits:
          memory: "512Mi"

    map:
      startup:
        staggerMaxSeconds: 300
        worldReadyDelaySeconds: 20
        restartOnWorldDisconnect:
          enabled: true
          checkIntervalSeconds: 2
          failureThreshold: 2
      publicEndpoint:
        ipv4DiscoveryURL: https://api.ipify.org
      defaultResources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          memory: 512Mi
      heartbeatSidecar:
        downstreamStatusURL: http://api-server:8080/v1/server/map-status-reports
      shards:
        - name: "Admin Services"
          port: 54230
          zoneIds:
            - 0
            - 49
            - 199
            - 210
            - 214
            - 219
          resources:
            requests:
