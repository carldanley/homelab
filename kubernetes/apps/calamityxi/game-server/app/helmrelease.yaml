---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: game-server
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: calamityxi-game-server
    namespace: flux-system
  values:
    image:
      repository: ghcr.io/calamityffxi/custom-game-server
      tag: v0.1.19
      pullPolicy: IfNotPresent

    secrets:
      credentialsSecretName: early-access-game-server-common-credentials-secret
      imagePullSecretName: early-access-game-server-common-ghcr-secret
      connectTlsSecretName: early-access-game-server-connect-tls

    network:
      serviceLoadBalancerIP: 10.50.100.30
      loadBalancerSharingKey: calamityxi-early-access-game-server

    map:
      startup:
        staggerMaxSeconds: 300
      publicEndpoint:
        ipv4DiscoveryURL: https://api.ipify.org
      defaultResources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          memory: 512Mi
      heartbeatSidecar:
        downstreamStatusURL: http://api-server:8080/v1/server/map-status-reports
      shards:
        - name: "Admin Service"
          port: 54230
          zoneIds: [0, 49, 199, 210, 214, 219]
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits: { memory: "1Gi" }
        - name: "Mordion Gaol"
          port: 54278
          zoneIds: [131]
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { memory: "1Gi" }
        - name: "Lower Jeuno"
          port: 54231
          zoneIds: [245]
          resources:
            requests: { cpu: "1000m", memory: "1Gi" }
            limits: { memory: "2Gi" }
        - name: "Port Jeuno"
          port: 54232
          zoneIds: [246]
          resources:
            requests: { cpu: "1000m", memory: "1Gi" }
            limits: { memory: "2Gi" }
        - name: "Aht Urhgan Whitegate"
          port: 54233
