---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: map-heartbeat-sidecar
  namespace: calamityxi
  labels:
    app.kubernetes.io/name: map-heartbeat-sidecar
spec:
  groups:
    - name: map-heartbeat-sidecar.rules
      rules:
        - alert: MapHeartbeatSidecarContainerNotReady
          expr: |
            max by (namespace, pod) (
              kube_pod_container_status_ready{namespace="calamityxi",container="heartbeat",pod=~"cxi-map-.*"}
            ) == 0
          for: 5m
          labels:
            severity: critical
            discord_channel: calamityxi-map-servers
          annotations:
            summary: map heartbeat sidecar container is not ready
            description: Map heartbeat sidecar {{ $labels.namespace }}/{{ $labels.pod }} has been unready for five minutes. Kubernetes will remove this pod from map Service endpoints, so the shard may not receive client traffic.

        - alert: MapHeartbeatSidecarMetricsAbsent
          expr: absent(map_heartbeat_sidecar_ready{namespace="calamityxi"})
          for: 5m
          labels:
            severity: critical
            discord_channel: calamityxi-map-servers
          annotations:
            summary: map heartbeat sidecar metrics are absent
            description: Prometheus has not scraped any map heartbeat sidecar metrics in calamityxi for five minutes. Check the PodMonitor, pod labels, and heartbeat sidecar HTTP port.

        - alert: MapHeartbeatSidecarPodNotReady
          expr: map_heartbeat_sidecar_ready{namespace="calamityxi"} == 0
          for: 5m
          labels:
            severity: critical
            discord_channel: calamityxi-map-servers
          annotations:
            summary: map heartbeat sidecar pod is not ready
            description: Map heartbeat sidecar {{ $labels.namespace }}/{{ $labels.pod }} has reported not-ready for five minutes. Kubernetes will remove this pod from map Service endpoints, so the shard may not receive client traffic.

        - alert: MapHeartbeatSidecarHeartbeatStale
          expr: map_heartbeat_sidecar_heartbeat_age_seconds{namespace="calamityxi"} > 30
          for: 2m
          labels:
            severity: critical
            discord_channel: calamityxi-map-servers
          annotations:
            summary: map heartbeat is stale
            description: Map heartbeat sidecar {{ $labels.namespace }}/{{ $labels.pod }} has not accepted a fresh xi_map heartbeat for more than 30 seconds.

        - alert: MapHeartbeatSidecarHeartbeatLagging
          expr: map_heartbeat_sidecar_heartbeat_age_seconds{namespace="calamityxi"} > 10
          for: 2m
          labels:
            severity: warning
            discord_channel: calamityxi-map-servers
          annotations:
            summary: map heartbeat is lagging
            description: Map heartbeat sidecar {{ $labels.namespace }}/{{ $labels.pod }} has not accepted a fresh xi_map heartbeat for more than 10 seconds. This is an early warning for map tick stalls, overloaded pods, or a sidecar/socket problem before endpoint removal.

        - alert: MapHeartbeatSidecarDroppedHeartbeats
          expr: sum by (namespace, pod) (increase(map_heartbeat_sidecar_heartbeats_total{namespace="calamityxi",result="dropped"}[5m])) > 0
          for: 5m
          labels:
            severity: warning
            discord_channel: calamityxi-map-servers
          annotations:
            summary: map heartbeat sidecar is dropping heartbeats
            description: Map heartbeat sidecar {{ $labels.namespace }}/{{ $labels.pod }} has dropped stale or duplicate heartbeat datagrams for five minutes. Check xi_map restarts, sequence resets, and sidecar logs.

        - alert: MapHeartbeatSidecarInvalidHeartbeats
          expr: sum by (namespace, pod) (increase(map_heartbeat_sidecar_heartbeats_total{namespace="calamityxi",result="invalid"}[5m])) > 0
          for: 2m
          labels:
            severity: warning
            discord_channel: calamityxi-map-servers
          annotations:
            summary: map heartbeat sidecar received invalid heartbeats
            description: Map heartbeat sidecar {{ $labels.namespace }}/{{ $labels.pod }} is receiving invalid heartbeat datagrams. Check heartbeat schema compatibility between xi_map and the sidecar before trusting readiness.

        - alert: MapHeartbeatSidecarOfflineTransitions
          expr: sum by (namespace, pod) (increase(map_heartbeat_sidecar_offline_transitions_total{namespace="calamityxi"}[10m])) > 0
          for: 1m
          labels:
            severity: warning
            discord_channel: calamityxi-map-servers
          annotations:
            summary: map heartbeat sidecar reported offline transitions
            description: Map heartbeat sidecar {{ $labels.namespace }}/{{ $labels.pod }} reported one or more offline transitions in the last ten minutes. Check the matching map pod logs and rollout timing.

        - alert: MapServerContainerRestarted
          expr: sum by (namespace, pod, container) (increase(kube_pod_container_status_restarts_total{namespace="calamityxi",pod=~"cxi-map-.*",container=~"app|heartbeat"}[10m])) > 0
          for: 1m
          labels:
            severity: warning
            discord_channel: calamityxi-map-servers
          annotations:
            summary: map server container restarted
            description: Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} restarted in the last ten minutes. Correlate this with heartbeat age, dropped packets, and operator rollout activity.

        - alert: MapServerMemoryPressureHigh
          expr: |-
            (
              max by (namespace, pod, container) (
                container_memory_working_set_bytes{namespace="calamityxi",pod=~"cxi-map-.*",container=~"app|heartbeat"}
              )
              /
              max by (namespace, pod, container) (
                kube_pod_container_resource_limits{namespace="calamityxi",pod=~"cxi-map-.*",container=~"app|heartbeat",resource="memory",unit="byte"}
              )
            ) > 0.85
          for: 10m
          labels:
            severity: warning
            discord_channel: calamityxi-map-servers
          annotations:
            summary: map server memory pressure is high
            description: Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} is using more than 85 percent of its memory limit for ten minutes. Increase the shard resources or split hot zones before OOM restarts hit players.
