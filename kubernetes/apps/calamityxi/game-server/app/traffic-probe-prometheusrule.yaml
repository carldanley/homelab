---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: calamityxi-traffic-probe
  namespace: calamityxi
  labels:
    app.kubernetes.io/name: calamityxi-traffic-probe
spec:
  groups:
    - name: calamityxi-traffic-probe.rules
      rules:
        - alert: CalamityXITrafficProbeMetricsAbsent
          expr: |-
            absent(calamityxi_synthetic_probe_info{namespace="calamityxi"})
          for: 5m
          labels:
            severity: warning
            discord_channel: calamityxi-map-servers
          annotations:
            summary: >-
              CalamityXI synthetic traffic probe metrics are absent
            description: >-
              Prometheus has not scraped the synthetic traffic probe for five
              minutes. Spike and baseline dashboards will not show forced
              connect/search/map edge traffic until this probe is healthy.

        - alert: CalamityXITrafficProbeTCPFailure
          expr: |-
            calamityxi_synthetic_probe_success{namespace="calamityxi",protocol="tcp"} == 0
          for: 5m
          labels:
            severity: warning
            discord_channel: calamityxi-connect-server
          annotations:
            summary: >-
              CalamityXI synthetic TCP probe is failing
            description: >-
              The synthetic traffic probe cannot connect to {{ $labels.target
              }}:{{ $labels.port }} over TCP. Check the VPS DNAT route,
              WireGuard return path, Cilium LoadBalancer, and the target
              connect/search listener before assuming the game service is fine.

        - alert: CalamityXITrafficProbeTCPLatencyHigh
          expr: |-
            max by (namespace, target, port) (
              calamityxi_synthetic_probe_last_duration_seconds{namespace="calamityxi",protocol="tcp"}
            ) > 1
          for: 10m
          labels:
            severity: warning
            discord_channel: calamityxi-connect-server
          annotations:
            summary: >-
              CalamityXI synthetic TCP latency is high
            description: >-
              The latest synthetic TCP connect to {{ $labels.target }}:{{
              $labels.port }} has stayed above one second for ten minutes.

        - alert: CalamityXITrafficProbeUDPSendsStopped
          expr: |-
            sum by (namespace, target, port) (
              increase(calamityxi_synthetic_probe_attempts_total{namespace="calamityxi",protocol="udp",result="sent"}[5m])
            ) < 1
          for: 5m
          labels:
            severity: warning
            discord_channel: calamityxi-map-servers
          annotations:
            summary: >-
              CalamityXI synthetic UDP traffic stopped
            description: >-
              The synthetic traffic probe has not generated UDP packets for {{
              $labels.target }}:{{ $labels.port }} in the last five minutes.
              Map edge traffic baselines will be stale until the sender recovers.

        - alert: CalamityXITrafficProbeUDPSendErrors
          expr: |-
            sum by (namespace, target, port, result) (
              increase(calamityxi_synthetic_probe_attempts_total{namespace="calamityxi",protocol="udp",result!="sent"}[5m])
            ) > 0
          for: 2m
          labels:
            severity: warning
            discord_channel: calamityxi-map-servers
          annotations:
            summary: >-
              CalamityXI synthetic UDP send errors
            description: >-
              The synthetic traffic probe is reporting {{ $labels.result }}
              while sending UDP to {{ $labels.target }}:{{ $labels.port }}.
