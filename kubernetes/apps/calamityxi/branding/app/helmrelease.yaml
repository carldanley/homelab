---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: branding
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:

      branding:
        replicas: 3
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/calamityffxi/branding
              tag: v0.1.9
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5

    defaultPodOptions:
      hostUsers: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      imagePullSecrets:
        - name: branding-ghcr-secret

    service:
      branding:
        controller: branding
        ports:
          http:
            port: &port 8080

    route:
      internal:
        hostnames:
          - "branding.${DOMAIN_8}"
        parentRefs:
          - name: external
            namespace: kube-system
            sectionName: domain-8-subdomain-https
        rules:
          - backendRefs:
              - identifier: branding
                port: *port
