---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: tuppr
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.3.3
  url: oci://ghcr.io/home-operations/charts/tuppr
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tuppr
spec:
  chartRef:
    kind: OCIRepository
    name: tuppr
  interval: 1h
  values:
    replicaCount: 2
    controller:
      logLevel: info
    monitoring:
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            dashboards: grafana
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true

  postRenderers:
    - kustomize:
        patches:
          - target:
              group: grafana.integreatly.org
              version: v1beta1
              kind: GrafanaDashboard
              name: tuppr-dashboard
            patch: |-
              - op: add
                path: /spec/folderUID
                value: private-system-upgrade
