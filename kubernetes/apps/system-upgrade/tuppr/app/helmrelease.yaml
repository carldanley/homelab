---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: tuppr
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.3.2
  url: oci://ghcr.io/home-operations/charts/tuppr
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tuppr
spec:
  chartRef:
    kind: OCIRepository
    name: tuppr
  interval: 1h
  values:
    replicaCount: 2
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/name: tuppr
                app.kubernetes.io/instance: tuppr
            topologyKey: kubernetes.io/hostname
    controller:
      logLevel: info
    monitoring:
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            dashboards: grafana
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true

  postRenderers:
    - kustomize:
        patches:
          - target:
              group: grafana.integreatly.org
              version: v1beta1
              kind: GrafanaDashboard
              name: tuppr-dashboard
            patch: |-
              - op: add
                path: /spec/folderUID
                value: private-system-upgrade
          - target:
              group: monitoring.coreos.com
              version: v1
              kind: PrometheusRule
              name: tuppr
            patch: |-
              - op: test
                path: /spec/groups/0/rules/2/alert
                value: TalosUpgradeStuck
              - op: replace
                path: /spec/groups/0/rules/2/for
                value: 15m
              - op: replace
                path: /spec/groups/0/rules/2/annotations/description
                value: >-
                  Talos upgrade {{ $labels.name }} has been in the
                  {{ $labels.phase }} phase for more than 15 minutes.
                  Check the upgrade job and target node for errors.
