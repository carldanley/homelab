---
apiVersion: tuppr.home-operations.com/v1alpha1
kind: TalosUpgrade
metadata:
  name: talos
spec:
  policy:
    # Worker nodes host singleton/PDB-protected workloads; let Talos reboot
    # handle disruption instead of blocking on Kubernetes eviction.
    nodrain: true
  talos:
    # renovate: datasource=custom.talos-factory depName=siderolabs/talos
    version: v1.13.4
  healthChecks:
    - apiVersion: ceph.rook.io/v1
      kind: CephCluster
      expr: status.ceph.health in ['HEALTH_OK']
    - apiVersion: volsync.backube/v1alpha1
      kind: ReplicationSource
      expr: status.conditions.filter(c, c.type == "Synchronizing").all(c, c.status == "False")
