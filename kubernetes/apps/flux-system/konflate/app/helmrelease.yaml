---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: konflate
spec:
  chartRef:
    kind: OCIRepository
    name: konflate
  interval: 1h
  values:
    config:
      clusterPath: ./kubernetes/flux/cluster
      prComments: true
      publicUrl: https://konflate.${DOMAIN_7}
      refreshInterval: "0"
      repo: github://carldanley/homelab
      statusChecks: true

    deploymentAnnotations:
      reloader.stakater.com/auto: "true"

    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/endpoint: |-
          conditions: ["[STATUS] == 200"]
      hostnames:
        - konflate.${DOMAIN_7}
      parentRefs:
        - name: external
          namespace: kube-system
          sectionName: domain-7-subdomain-https

    monitoring:
      serviceMonitor:
        enabled: true

    resources:
      requests:
        cpu: 50m
      limits:
        memory: 1Gi

    secret:
      existingSecret: konflate-secret
