---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: konflate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: konflate-secret
  data:
    - secretKey: KONFLATE_WEBHOOK_SECRET
      remoteRef:
        key: konflate
        property: WEBHOOK_SECRET
    - secretKey: KONFLATE_APP_CLIENT_ID
      remoteRef:
        key: konflate
        property: APP_CLIENT_ID
    - secretKey: KONFLATE_APP_PRIVATE_KEY
      remoteRef:
        key: konflate
        property: APP_PRIVATE_KEY
        decodingStrategy: Base64
