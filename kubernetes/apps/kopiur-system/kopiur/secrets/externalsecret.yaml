---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kopia-storage
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: kopia-storage-secret
    template:
      metadata:
        annotations:
          # Kopiur 0.7.0 runs Snapshot deletion movers in the Snapshot
          # namespace. When an app is pruned, Snapshot finalizers can outlive
          # the SnapshotPolicy that normally projects credentials there. Keep
          # this reflected into backup namespaces until upstream cleanup can
          # resolve ClusterRepository credentials without namespace-local
          # copies.
          reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
          reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: "ai,home-automation,media,nvr,selfhosted"
          reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
          reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: "ai,home-automation,media,nvr,selfhosted"
  dataFrom:
    - extract:
        key: kopia-storage
