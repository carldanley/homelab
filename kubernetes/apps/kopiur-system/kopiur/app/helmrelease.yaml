---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kopiur
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kopiur
  values:
    installScope: cluster
    replicaCount: 2
    leaderElection:
      enabled: true
    podDisruptionBudget:
      enabled: true
    features:
      credentialProjection:
        enabled: true
      kopiaUi:
        enabled: true
    monitoring:
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            dashboards: grafana
      prometheusRule:
        enabled: true
      serviceMonitor:
        enabled: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
    webhook:
      replicaCount: 2
      podDisruptionBudget:
        enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
      serviceMonitor:
        enabled: true

  postRenderers:
    - kustomize:
        patches:
          # Preserve Kopiur's resource namespace instead of the scrape namespace.
          - target:
              group: monitoring.coreos.com
              version: v1
              kind: ServiceMonitor
              name: kopiur-controller
            patch: |-
              - op: add
                path: /spec/endpoints/0/honorLabels
                value: true
          # Alert on active policy failures, not retained failed Snapshot CRs.
          - target:
              group: monitoring.coreos.com
              version: v1
              kind: PrometheusRule
              name: kopiur-controller
            patch: |-
              - op: replace
                path: /spec/groups/0/rules/0/expr
                value: kopiur_snapshot_consecutive_failures > 0
              - op: replace
                path: /spec/groups/0/rules/0/for
                value: 10m
              - op: replace
                path: /spec/groups/0/rules/0/annotations/description
                value: >-
                  {{ $value }} consecutive backup failure(s) for SnapshotPolicy
                  {{ $labels.namespace }}/{{ $labels.name }}.
              - op: remove
                path: /spec/groups/0/rules/3
          - target:
              group: grafana.integreatly.org
              version: v1beta1
              kind: GrafanaDashboard
              name: kopiur-dashboard
            patch: |-
              - op: add
                path: /spec/folderUID
                value: private-kopiur-system
