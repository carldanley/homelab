---
apiVersion: kopiur.home-operations.com/v1alpha1
kind: ClusterRepository
metadata:
  name: r2
spec:
  allowedNamespaces:
    list:
      - ai
      - home-automation
      - identity
      - kopiur-system
      - media
      - nvr
      - selfhosted
  backend:
    s3:
      bucket: batcave-kopia-backups
      endpoint: ${AWS_ENDPOINT}
      region: auto
      auth:
        secretRef:
          name: kopia-storage-secret
          namespace: kopiur-system
  bootstrap:
    failurePolicy:
      activeDeadlineSeconds: 300
      backoffLimit: 2
  create:
    enabled: true
  credentialProjection:
    allowed: true
  encryption:
    passwordSecretRef:
      name: kopia-storage-secret
      namespace: kopiur-system
      key: KOPIA_PASSWORD
  identityDefaults:
    hostnameExpr: namespace
    usernameExpr: "namespace + '-' + policyName"
  health:
    indexBlobWarnThreshold: 5000
  parameters:
    epoch:
      minDuration: 6h
  moverDefaults:
    cache:
      capacity: 2Gi
      mode: Ephemeral
      storageClassName: openebs-hostpath
    podSecurityContext:
      fsGroup: 568
      fsGroupChangePolicy: OnRootMismatch
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
    scratch:
      capacity: 100Gi
      storageClassName: ceph-block
    securityContext:
      runAsUser: 568
      runAsGroup: 568
    ttlSecondsAfterFinished: 300
  scheduleDefaults:
    timezone: America/New_York
  server:
    namespace: kopiur-system
    readOnly: true
    auth:
      insecure:
        acknowledgeInsecure: true
    service:
      type: ClusterIP
      port: 51515
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
