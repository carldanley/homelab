---
apiVersion: v1
kind: ConfigMap
metadata:
  name: powerwall-dashboard-configmap
data:
  telegraf.conf: |
    [agent]
      interval = "30s"
      round_interval = true
      metric_batch_size = 1000
      metric_buffer_limit = 10000
      flush_interval = "15s"
      flush_jitter = "0s"
      omit_hostname = true

    [[outputs.prometheus_client]]
      listen = ":9273"
      path = "/metrics"
      metric_version = 2
      expiration_interval = "2m"

    [[inputs.http]]
      urls = [
        "http://powerwall-dashboard-pypowerwall:8675/aggregates",
        "http://powerwall-dashboard-pypowerwall:8675/soe",
        "http://powerwall-dashboard-pypowerwall:8675/freq",
        "http://powerwall-dashboard-pypowerwall:8675/pod"
      ]
      method = "GET"
      timeout = "10s"
      data_format = "json"

    [[inputs.http]]
      urls = ["http://powerwall-dashboard-pypowerwall:8675/alerts/pw"]
      name_override = "powerwall_alerts"
      method = "GET"
      timeout = "10s"
      data_format = "json"

    [[inputs.http]]
      urls = ["http://powerwall-dashboard-pypowerwall:8675/health"]
      name_override = "pypowerwall"
      method = "GET"
      timeout = "10s"
      data_format = "json_v2"

      [[inputs.http.json_v2]]
        [[inputs.http.json_v2.field]]
          path = "connection_health.is_degraded"
          rename = "is_degraded"
          type = "bool"
        [[inputs.http.json_v2.field]]
          path = "connection_health.last_success_age_seconds"
          type = "float"
        [[inputs.http.json_v2.field]]
          path = "connection_health.consecutive_failures"
          type = "int"
        [[inputs.http.json_v2.field]]
          path = "proxy_stats.total_errors"
          rename = "proxy_total_errors"
          type = "int"
        [[inputs.http.json_v2.field]]
          path = "proxy_stats.total_timeouts"
          rename = "proxy_total_timeouts"
          type = "int"

    [[processors.date]]
      tag_key = "month"
      date_format = "Jan"
      timezone = "America/New_York"

    [[processors.date]]
      tag_key = "year"
      date_format = "2006"
      timezone = "America/New_York"
