---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: powerwall-dashboard
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      pypowerwall:
        annotations:
          secret.reloader.stakater.com/reload: "{{ .Release.Name }}-secret"
        containers:
          app:
            image:
              repository: jasonacox/pypowerwall
              tag: 0.15.7t89
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi

      telegraf:
        annotations:
          configmap.reloader.stakater.com/reload: "{{ .Release.Name }}-configmap"
        containers:
          app:
            image:
              repository: docker.io/library/telegraf
              tag: 1.39.2
            args:
              - telegraf
              - --config
              - /etc/telegraf/telegraf.conf
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi

    defaultPodOptions:
      hostUsers: false

    persistence:
      auth:
        existingClaim: "{{ .Release.Name }}-auth"
        advancedMounts:
          pypowerwall:
            app:
              - path: /app/.auth
      config:
        type: configMap
        name: "{{ .Release.Name }}-configmap"
        advancedMounts:
          telegraf:
            app:
              - path: /etc/telegraf/telegraf.conf
                subPath: telegraf.conf
                readOnly: true

    service:
      pypowerwall:
        controller: pypowerwall
        ports:
          http:
            port: 8675
      telegraf:
        controller: telegraf
        ports:
          metrics:
            port: &metricsPort 9273

    serviceMonitor:
      telegraf:
        serviceName: "{{ .Release.Name }}-telegraf"
        endpoints:
          - port: metrics
            interval: 30s
            scrapeTimeout: 10s
