---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: powerwall-influxdb
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: Powerwall InfluxDB
    uid: powerwall-influxdb
    type: influxdb
    access: proxy
    url: http://powerwall-dashboard-influxdb.selfhosted.svc.cluster.local:8086
    database: powerwall
    jsonData:
      httpMode: GET
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: powerwall-sun-and-moon
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: Sun and Moon
    uid: powerwall-sun-and-moon
    type: fetzerch-sunandmoon-datasource
    access: proxy
