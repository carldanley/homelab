---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadatasource_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: teslamate
spec:
  valuesFrom:
    - targetPath: user
      valueFrom:
        secretKeyRef:
          name: teslamate-secret
          key: DATABASE_USER
    - targetPath: secureJsonData.password
      valueFrom:
        secretKeyRef:
          name: teslamate-secret
          key: DATABASE_PASS
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: TeslaMate
    uid: TeslaMate
    type: postgres
    access: proxy
    url: postgres-ro.databases.svc.cluster.local:5432
    database: teslamate
    user: teslamate
    secureJsonData:
      password: placeholder
    jsonData:
      postgresVersion: 1500
      sslmode: disable
      database: teslamate
