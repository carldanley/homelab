---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teslamate
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:

      app:
        replicas: 1
        annotations:
          configmap.reloader.stakater.com/reload: "{{ .Release.Name }}-fleet-key-configmap"
          secret.reloader.stakater.com/reload: "{{ .Release.Name }}-secret,{{ .Release.Name }}-fleet-key-tls"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
              pullPolicy: IfNotPresent
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
          fleet-key-generator:
            image:
              repository: docker.io/alpine/openssl
              tag: 3.5.7
            command:
              - /bin/sh
              - -ec
            args:
              - |
                mkdir -p /www/.well-known/appspecific
                openssl pkey -in /cert/tls.key -pubout \
                  -out /www/.well-known/appspecific/com.tesla.3p.public-key.pem
                chmod 0444 /www/.well-known/appspecific/com.tesla.3p.public-key.pem
        containers:
          app:
            image:
              repository: teslamate/teslamate
              tag: 4.0.1@sha256:e77ec65007aafb40d736ed2c89675112fe8d960886ea9d7de3255f2b5360269f
            env:
              TZ: "America/New_York"
              DISABLE_MQTT: "false"
              MQTT_USERNAME: "mqtt"
              MQTT_HOST: "mosquitto.home-automation.svc.cluster.local"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            resources:
              requests:
                memory: 250Mi
                cpu: 50m
              limits:
                memory: 500Mi
          fleet-key:
            image:
              repository: ghcr.io/nginxinc/nginx-unprivileged
              tag: 1.27.4
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 64Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL

    service:
      app:
        ports:
          http:
            port: &port 4000
          fleet-key:
            port: &fleetKeyPort 8080

    defaultPodOptions:
      hostUsers: false

    route:
      internal:
        hostnames:
          - "teslamate.${DOMAIN_5}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: domain-5-subdomain-https
        rules:
          - backendRefs:
              - identifier: app
                port: *port

    persistence:
      fleet-key:
        type: emptyDir
        advancedMounts:
          app:
            fleet-key:
              - path: /www
                readOnly: true
            fleet-key-generator:
              - path: /www
      fleet-key-config:
        type: configMap
        name: "{{ .Release.Name }}-fleet-key-configmap"
        advancedMounts:
          app:
            fleet-key:
              - path: /etc/nginx/nginx.conf
                subPath: nginx.conf
                readOnly: true
      fleet-key-tls:
        type: secret
        name: "{{ .Release.Name }}-fleet-key-tls"
        advancedMounts:
          app:
            fleet-key-generator:
              - path: /cert
                readOnly: true
