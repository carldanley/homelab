---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./certificate.yaml
  - ./externalsecret.yaml
  - ./grafanadashboard.yaml
  - ./grafanadatasource.yaml
  - ./helmrelease.yaml
  - ./httproute.yaml
  - ./issuer.yaml
  - ./dnsendpoint.yaml
configMapGenerator:
  - name: teslamate-fleet-key-configmap
    files:
      - ./resources/nginx.conf
generatorOptions:
  disableNameSuffixHash: true
