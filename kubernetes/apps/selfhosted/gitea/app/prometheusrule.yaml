---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gitea
spec:
  groups:
    - name: gitea.rules
      rules:
        - alert: GiteaRegistryVolumeFillingUp
          expr: |-
            (
              kubelet_volume_stats_used_bytes{
                namespace="selfhosted",
                persistentvolumeclaim="gitea-packages"
              }
              /
              kubelet_volume_stats_capacity_bytes{
                namespace="selfhosted",
                persistentvolumeclaim="gitea-packages"
              }
            ) > 0.80
          for: 30m
          annotations:
            summary: Gitea registry storage is filling up
            description: >-
              The disposable Gitea package volume is more than 80 percent full.
              Review package cleanup rules and prune old commit images before
              the registry reaches capacity.
          labels:
            severity: warning
            discord_channel: homelab-alerts

        - alert: GiteaRegistryVolumeAlmostFull
          expr: |-
            (
              kubelet_volume_stats_used_bytes{
                namespace="selfhosted",
                persistentvolumeclaim="gitea-packages"
              }
              /
              kubelet_volume_stats_capacity_bytes{
                namespace="selfhosted",
                persistentvolumeclaim="gitea-packages"
              }
            ) > 0.90
          for: 15m
          annotations:
            summary: Gitea registry storage is almost full
            description: >-
              The disposable Gitea package volume is more than 90 percent full.
              Prune package versions or expand the PVC before image pushes fail.
          labels:
            severity: critical
            discord_channel: homelab-alerts

        - alert: GiteaSSHAuthenticationFailures
          expr: |-
            sum by (remote_ip) (
              increase(gitea_ssh_failed_authentications[10m])
            ) > 50
          annotations:
            summary: Repeated Gitea SSH authentication failures
            description: >-
              Gitea received {{ $value | humanize }} failed SSH authentication
              attempts from {{ $labels.remote_ip }} in the last 10 minutes.
              Review the source in VictoriaLogs before blocking it.
          labels:
            namespace: selfhosted
            severity: warning
            discord_channel: homelab-alerts

        - alert: GiteaSSHAuthenticationFailures
          expr: |-
            sum(
              increase(gitea_ssh_failed_authentications[10m])
            ) > 500
          annotations:
            summary: High volume of Gitea SSH authentication failures
            description: >-
              Gitea received {{ $value | humanize }} failed SSH authentication
              attempts in the last 10 minutes across all source addresses.
              Investigate a possible scan or attack and consider ingress
              rate-limiting.
          labels:
            namespace: selfhosted
            severity: critical
            discord_channel: homelab-alerts
