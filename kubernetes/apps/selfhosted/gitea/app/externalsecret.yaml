---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitea
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: gitea-secret
    template:
      data:
        # Gitea runtime secrets
        GITEA_POSTGRES_PASS: "{{ .GITEA_POSTGRES_PASS }}"
        GITEA_SECRET_KEY: "{{ .GITEA_SECRET_KEY }}"
        GITEA_INTERNAL_TOKEN: "{{ .GITEA_INTERNAL_TOKEN }}"
        GITEA_JWT_SECRET: "{{ .GITEA_JWT_SECRET }}"
        GITEA_LFS_JWT_SECRET: "{{ .GITEA_LFS_JWT_SECRET }}"
        GITEA_LFS_ACCESS_KEY_ID: "{{ .GITEA_LFS_ACCESS_KEY_ID }}"
        GITEA_LFS_SECRET_ACCESS_KEY: "{{ .GITEA_LFS_SECRET_ACCESS_KEY }}"
        GITEA_METRICS_TOKEN: "{{ .GITEA_METRICS_TOKEN }}"

        # Authentik OAuth2 credentials; key names are required by the Gitea chart.
        key: "{{ .GITEA_AUTHENTIK_CLIENT_ID }}"
        secret: "{{ .GITEA_AUTHENTIK_CLIENT_SECRET }}"
        GITEA_AUTHENTIK_GROUP_TEAM_MAP: "{{ .GITEA_AUTHENTIK_GROUP_TEAM_MAP }}"

        # Mailgun SMTP
        GITEA_MAILER_ADDR: "{{ .MAILGUN_HOST }}"
        GITEA_MAILER_PORT: "{{ .MAILGUN_PORT }}"
        GITEA_MAILER_USER: "{{ .MAILGUN_USERNAME }}"
        GITEA_MAILER_PASSWD: "{{ .MAILGUN_PASSWORD }}"

        # Shared CloudNativePG database initialization
        INIT_POSTGRES_DBNAME: gitea
        INIT_POSTGRES_HOST: postgres-rw.databases.svc.cluster.local
        INIT_POSTGRES_USER: gitea
        INIT_POSTGRES_PASS: "{{ .GITEA_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: gitea
    - extract:
        key: cloudnative-pg
    - extract:
        key: mailgun
