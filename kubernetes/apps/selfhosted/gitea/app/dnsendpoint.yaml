---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: gitea-internal
  labels:
    dns.homelab/external: "false"
spec:
  endpoints:
    - dnsName: "git.${DOMAIN_7}"
      recordTTL: 60
      recordType: CNAME
      targets:
        - "internal.${DOMAIN_7}"
    - dnsName: "ssh.${DOMAIN_7}"
      recordTTL: 60
      recordType: A
      targets:
        - "10.50.100.4"
---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: gitea-external
  labels:
    dns.homelab/external: "true"
spec:
  endpoints:
    - dnsName: "git.${DOMAIN_7}"
      recordTTL: 60
      recordType: CNAME
      targets:
        - "external.${DOMAIN_7}"
    - dnsName: "ssh.${DOMAIN_7}"
      recordTTL: 60
      recordType: A
      targets:
        - "${WAN_IP}"
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
