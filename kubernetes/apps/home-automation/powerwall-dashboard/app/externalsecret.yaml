---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: powerwall-dashboard
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: powerwall-dashboard-secret
    template:
      data:
        PW_AUTH_PATH: /app/.auth
        PW_CACHE_EXPIRE: "20"
        PW_CACHE_TTL: "60"
        PW_DEBUG: "no"
        PW_EMAIL: "{{ .PW_EMAIL }}"
        PW_FAIL_FAST: "no"
        PW_GRACEFUL_DEGRADATION: "yes"
        PW_HEALTH_CHECK: "yes"
        PW_HOST: ""
        PW_NEG_SOLAR: "yes"
        PW_PASSWORD: ""
        PW_STYLE: grafana-dark
        PW_TIMEOUT: "10"
        PW_TIMEZONE: America/New_York
        TZ: America/New_York
  dataFrom:
    - extract:
        key: powerwall-dashboard
