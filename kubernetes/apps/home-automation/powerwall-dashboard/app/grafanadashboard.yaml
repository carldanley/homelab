---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: powerwall-dashboard
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: powerwall
  datasources:
    - datasourceName: Powerwall InfluxDB
      inputName: DS_INFLUXDB
    - datasourceName: Sun and Moon
      inputName: DS_SUN_AND MOON
  url: https://raw.githubusercontent.com/jasonacox/Powerwall-Dashboard/main/dashboards/dashboard-no-animation.json
