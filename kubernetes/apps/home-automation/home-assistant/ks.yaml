---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app home-assistant
  namespace: &namespace home-automation
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  components:
    - ../../../../components/kopiur
    - ../../../../components/kopiur-restore
  dependsOn:
    - name: cert-manager-secrets
      namespace: cert-manager
    - name: multus-networks
      namespace: network
    - name: kopiur-repository
      namespace: kopiur-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: *app
      namespace: *namespace
  healthCheckExprs:
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
    - apiVersion: kopiur.home-operations.com/v1alpha1
      kind: SnapshotPolicy
      inProgress: status.observedGeneration != metadata.generation || status.conditions.exists(e, e.type == 'Reconciling' && e.status == 'True')
      failed: status.conditions.exists(e, e.type == 'Ready' && e.status == 'False') || status.conditions.exists(e, e.type == 'Stalled' && e.status == 'True')
      current: status.observedGeneration == metadata.generation && status.conditions.exists(e, e.type == 'Ready' && e.status == 'True')
    - apiVersion: kopiur.home-operations.com/v1alpha1
      kind: SnapshotSchedule
      inProgress: status.observedGeneration != metadata.generation || status.conditions.exists(e, e.type == 'Reconciling' && e.status == 'True')
      failed: status.conditions.exists(e, e.type == 'Ready' && e.status == 'False') || status.conditions.exists(e, e.type == 'Stalled' && e.status == 'True')
      current: status.observedGeneration == metadata.generation && status.conditions.exists(e, e.type == 'Ready' && e.status == 'True')
    - apiVersion: kopiur.home-operations.com/v1alpha1
      kind: Restore
      inProgress: status.observedGeneration != metadata.generation || status.phase != 'Completed'
      failed: status.phase == 'Failed' || status.conditions.exists(e, e.type == 'Stalled' && e.status == 'True')
      current: status.observedGeneration == metadata.generation && status.phase == 'Completed'
  interval: 1h
  path: ./kubernetes/apps/home-automation/home-assistant/app
  postBuild:
    substituteFrom:
      - kind: Secret
        name: domains-secret
        optional: false
    substitute:
      APP: *app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
