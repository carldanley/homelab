---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-issuer
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cloudflare-issuer-secret
    creationPolicy: Owner
  data:
  - secretKey: API_TOKEN
    remoteRef:
      key: cloudflare
      property: api-token
