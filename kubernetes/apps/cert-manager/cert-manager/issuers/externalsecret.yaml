---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-issuer
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: cloudflare-issuer-secret
    creationPolicy: Owner
  data:
  - secretKey: api-token
    remoteRef:
      key: cloudflare
      property: api-token
  - secretKey: domain1
    remoteRef:
      key: cloudflare
      property: domain-1
  - secretKey: domain2
    remoteRef:
      key: cloudflare
      property: domain-2
  - secretKey: domain3
    remoteRef:
      key: cloudflare
      property: domain-3
  - secretKey: domain4
    remoteRef:
      key: cloudflare
      property: domain-4
  - secretKey: domain5
    remoteRef:
      key: cloudflare
      property: domain-5
  - secretKey: domain6
    remoteRef:
      key: cloudflare
      property: domain-6
