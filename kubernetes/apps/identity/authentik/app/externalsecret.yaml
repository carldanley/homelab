---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: authentik-secret
    template:
      data:
        # Authentik runtime configuration
        AUTHENTIK_SECRET_KEY: "{{ .AUTHENTIK_SECRET_KEY }}"
        AUTHENTIK_POSTGRESQL__HOST: postgres-rw.databases.svc.cluster.local
        AUTHENTIK_POSTGRESQL__NAME: authentik
        AUTHENTIK_POSTGRESQL__USER: authentik
        AUTHENTIK_POSTGRESQL__PASSWORD: "{{ .AUTHENTIK_POSTGRES_PASS }}"

        # Mailgun SMTP
        AUTHENTIK_EMAIL__HOST: "{{ .MAILGUN_HOST }}"
        AUTHENTIK_EMAIL__PORT: "{{ .MAILGUN_PORT }}"
        AUTHENTIK_EMAIL__USERNAME: "{{ .MAILGUN_USERNAME }}"
        AUTHENTIK_EMAIL__PASSWORD: "{{ .MAILGUN_PASSWORD }}"
        AUTHENTIK_EMAIL__USE_SSL: "true"
        AUTHENTIK_EMAIL__FROM: "Authentik <authentik@mail.${DOMAIN_5}>"

        # Shared CloudNativePG database initialization
        INIT_POSTGRES_DBNAME: authentik
        INIT_POSTGRES_HOST: postgres-rw.databases.svc.cluster.local
        INIT_POSTGRES_USER: authentik
        INIT_POSTGRES_PASS: "{{ .AUTHENTIK_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: authentik
    - extract:
        key: cloudnative-pg
    - extract:
        key: mailgun
