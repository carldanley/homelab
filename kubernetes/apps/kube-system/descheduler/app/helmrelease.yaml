---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: descheduler
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.36.0
  url: oci://ghcr.io/home-operations/charts-mirror/descheduler
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: descheduler
  values:
    replicas: 2
    kind: Deployment

    deschedulerPolicyAPIVersion: descheduler/v1alpha2
    deschedulerPolicy:
      maxNoOfPodsToEvictPerNode: 2
      maxNoOfPodsToEvictTotal: 4
      metricsProviders:
        - source: Prometheus
          prometheus:
            url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
      profiles:
        - name: Default
          pluginConfig:
            - name: DefaultEvictor
              args:
                podProtections:
                  defaultDisabled:
                    - FailedBarePods
                    - PodsWithLocalStorage
                    - SystemCriticalPods
            - name: RemoveFailedPods
              args:
                reasons:
                  - ContainerStatusUnknown
                  - NodeAffinity
                  - NodeShutdown
                  - Terminated
                  - UnexpectedAdmissionError
                includingInitContainers: true
                excludeOwnerKinds:
                  - Job
                minPodLifetimeSeconds: 1800
            - name: RemovePodsViolatingInterPodAntiAffinity
            - name: RemovePodsViolatingNodeAffinity
              args:
                nodeAffinityType:
                  - requiredDuringSchedulingIgnoredDuringExecution
            - name: RemovePodsViolatingTopologySpreadConstraint
          plugins:
            balance:
              enabled:
                - RemovePodsViolatingTopologySpreadConstraint
            deschedule:
              enabled:
                - RemoveFailedPods
                - RemovePodsViolatingInterPodAntiAffinity
                - RemovePodsViolatingNodeAffinity
        - name: SafeLowUtilization
          pluginConfig:
            - name: DefaultEvictor
              args:
                nodeFit: true
                minPodAge: 30m
                noEvictionPolicy: Mandatory
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - cloudflared-http
                        - echo-server
                        - snapshot-controller
                podProtections:
                  extraEnabled:
                    - PodsWithPVC
            - name: LowNodeUtilization
              args:
                metricsUtilization:
                  source: Prometheus
                  prometheus:
                    query: |
                      label_replace(
                        max by (node) (kubelet_running_pods{job="kubelet", metrics_path="/metrics"})
                          / max by (node) (kube_node_status_capacity{job="kube-state-metrics", resource="pods"}),
                        "instance", "$1", "node", "(.+)"
                      )
                thresholds:
                  MetricResource: 60
                targetThresholds:
                  MetricResource: 85
                evictionLimits:
                  node: 2
                evictableNamespaces:
                  exclude:
                    - actions-runner-system
                    - cert-manager
                    - databases
                    - external-secrets
                    - kube-system
                    - rook-ceph
                    - system-upgrade
          plugins:
            balance:
              enabled:
                - LowNodeUtilization

    service:
      enabled: true
    serviceMonitor:
      enabled: true
    leaderElection:
      enabled: true
