---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: internal
  annotations:
    external-dns.alpha.kubernetes.io/target: &hostname "internal.${DOMAIN_4},internal.${DOMAIN_5}"
spec:
  gatewayClassName: cilium
  addresses:
    - type: IPAddress
      value: 10.50.50.1
  infrastructure:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: *hostname
  listeners:

    ########################
    # DOMAIN 4
    ########################

    - name: domain-4-subdomain-http
      protocol: HTTP
      port: 80
      hostname: "*.${DOMAIN_4}"
      allowedRoutes:
        namespaces:
          from: Same

    - name: domain-4-root-http
      protocol: HTTP
      port: 80
      hostname: "${DOMAIN_4}"
      allowedRoutes:
        namespaces:
          from: Same

    - name: domain-4-subdomain-https
      protocol: HTTPS
      port: 443
      hostname: "*.${DOMAIN_4}"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: wildcard-certificate-tls

    - name: domain-4-root-https
      protocol: HTTPS
      port: 443
      hostname: "${DOMAIN_4}"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: wildcard-certificate-tls

    ########################
    # DOMAIN 5
    ########################

    - name: domain-5-subdomain-http
      protocol: HTTP
      port: 80
      hostname: "*.${DOMAIN_5}"
      allowedRoutes:
        namespaces:
          from: Same

    - name: domain-5-root-http
      protocol: HTTP
      port: 80
      hostname: "${DOMAIN_5}"
      allowedRoutes:
        namespaces:
          from: Same

    - name: domain-5-subdomain-https
      protocol: HTTPS
      port: 443
      hostname: "*.${DOMAIN_5}"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: wildcard-certificate-tls

    - name: domain-5-root-https
      protocol: HTTPS
      port: 443
      hostname: "${DOMAIN_5}"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: wildcard-certificate-tls
