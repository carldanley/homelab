---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: internal-domain-5
  annotations:
    external-dns.alpha.kubernetes.io/target: &hostname "internal.${DOMAIN_5}"
spec:
  gatewayClassName: cilium
  addresses:
    - type: IPAddress
      value: 10.50.51.55
  infrastructure:
    annotations:
      external-dns.alpha.kubernetes.io/hostname: *hostname
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.${DOMAIN_5}"
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.${DOMAIN_5}"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        certificateRefs:
          - kind: Secret
            name: domain-5-tls
