---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: irqbalance
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  values:
    controllers:
      irqbalance:
        type: daemonset
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/irqbalance
              tag: 1.9.5@sha256:5c58790f22fea1e331b3312977005e66586ced3d39e2d0e4fddb7dfacf873fb5
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 32Mi
            securityContext:
              privileged: true

    defaultPodOptions:
      hostIPC: true
      hostPID: true
      priorityClassName: system-node-critical
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists

    persistence:
      run:
        type: emptyDir
        globalMounts:
          - path: /run/irqbalance
