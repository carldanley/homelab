---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: drm-exporter
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.3.0
  url: oci://ghcr.io/home-operations/charts/drm-exporter
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: drm-exporter
spec:
  chartRef:
    kind: OCIRepository
    name: drm-exporter
  interval: 1h
  values:
    dra:
      enabled: true
      deviceClassName: gpu.amd.com

    nodeSelector:
      gpu.homelab/amd: "true"

    securityContext:
      capabilities:
        add:
          - PERFMON

    monitoring:
      serviceMonitor:
        enabled: true
      dashboards:
        enabled: true
        grafanaOperator:
          enabled: true
          matchLabels:
            dashboards: grafana

    resources:
      requests:
        cpu: 10m
      limits:
        memory: 128Mi
