---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
components:
  - ../../components/common
resources:
  - ./cilium/ks.yaml
  - ./coredns/ks.yaml
  - ./spegel/ks.yaml
  - ./metrics-server/ks.yaml
  - ./reflector/ks.yaml
  - ./reloader/ks.yaml
  - ./irqbalance/ks.yaml
  - ./descheduler/ks.yaml
  - ./k8s-gpu-dra-driver/ks.yaml
  - ./drm-exporter/ks.yaml
  - ./intel-device-plugin/ks.yaml
patches:
  - patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: not-used
        labels:
          resource.kubernetes.io/admin-access: "true"
    target:
      kind: Namespace
      name: not-used
