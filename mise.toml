[tools]
# Keep kubectl and talosctl aligned with the versions declared for cluster upgrades.
kubectl = "1.36.2"
talosctl = "1.13.6"

# Flux/Helm workflow tools.
flux2 = "2.9.1"
helm = "4.2.2"
helmfile = "1.7.0"
"pipx:flux-local" = "8.4.0"

# Repository automation and operator tools.
"1password-cli" = "2.33.1"
jq = "1.8.2"
k9s = "0.51.0"
task = "3.52.0"
uv = "0.11.28"
yq = "4.53.3"

# Used by the Talos templates. This goes through Cargo because minijinja-cli's
# prebuilt installer is not managed by mise's aqua registry consistently.
rust = "1.96.1"
"cargo:minijinja-cli" = "2.19.0"
