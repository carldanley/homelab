---
version: "3"

set:
  - pipefail
shopt:
  - globstar

vars:
  KUBERNETES_DIR: "{{ .ROOT_DIR }}/kubernetes"
  TALOS_DIR: "{{ .ROOT_DIR }}/talos"
  BOOTSTRAP_DIR: "{{ .ROOT_DIR }}/bootstrap"
  TALOSCONFIG_PATH:
    sh: |-
      if [ -n "${TALOSCONFIG:-}" ]; then
        printf '%s\n' "${TALOSCONFIG}"
      elif [ -f "{{ .TALOS_DIR }}/talosconfig" ]; then
        printf '%s\n' "{{ .TALOS_DIR }}/talosconfig"
      else
        printf '%s\n' "${XDG_CONFIG_HOME:-$HOME/.config}/talos/config"
      fi

env:
  TALOSCONFIG: "{{ .TALOSCONFIG_PATH }}"

includes:
  bootstrap: .taskfiles/bootstrap
  talos: .taskfiles/talos
  tools: .taskfiles/tools
  validate: .taskfiles/validate
  volsync: .taskfiles/volsync

tasks:
  default:
    cmd: task --list
    silent: true

  validate:
    desc: Run local validation checks
    cmds:
      - task: validate:all

  k9s:
    desc: Run k9s
    cmd: k9s
    env:
      KUBECONFIG: "{{ .KUBERNETES_DIR }}/kubeconfig"
    preconditions:
      - which k9s
