---
name: Image Pull

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  filter:
    name: Image Pull - Filter
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get Changed Files
        id: changed-files
        uses: bjw-s-labs/action-changed-files@015416e33c709af88f84a4496f4030c1f0ef212e # v0.5.0
        with:
          patterns: |-
            kubernetes/**/*

  extract:
    if: ${{ needs.filter.outputs.changed-files != '[]' }}
    needs: filter
    name: Image Pull - Extract Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch:
          - default
          - pull
      fail-fast: false
    outputs:
      default: ${{ steps.extract.outputs.default }}
      pull: ${{ steps.extract.outputs.pull }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ matrix.branch == 'default' && github.event.repository.default_branch || '' }}

      - name: Create GHCR registry config
        env:
          GHCR_TOKEN: ${{ secrets.RENOVATE_GHCR_TOKEN }}
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/.tmp"
          auth=$(printf '%s' "carldanley:${GHCR_TOKEN}" | base64 -w 0)
          jq -n --arg auth "${auth}" '{auths: {"ghcr.io": {"auth": $auth}}}' > "${GITHUB_WORKSPACE}/.tmp/ghcr-docker-config.json"

      - name: Render Cluster
        uses: docker://ghcr.io/allenporter/flux-local:v8.0.1
        with:
          args: >-
            build all /github/workspace/kubernetes/flux/cluster
            --enable-helm
            --registry-config /github/workspace/.tmp/ghcr-docker-config.json
            --output-file cluster.yaml

      - name: Ensure PyYAML
        run: |
          python3 - <<'PY'
          import importlib.util
          import subprocess
          import sys

          if importlib.util.find_spec("yaml") is None:
              subprocess.check_call([sys.executable, "-m", "pip", "install", "PyYAML"])
          PY

      - name: Gather Images
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          import yaml

          KINDS = {
              "Pod",
              "Deployment",
              "StatefulSet",
              "ReplicaSet",
              "DaemonSet",
              "CronJob",
              "Job",
              "ReplicationController",
              "EMQX",
              "Cluster",
              "CephCluster",
              "Alertmanager",
              "Prometheus",
              "AutoscalingRunnerSet",
              "EnvoyProxy",
              "Plan",
              "Grafana",
          }
          IMAGE_KEY = "image"
          KINDS_IMAGE_KEY = {"Cluster": "imageName", "Grafana": "version"}

          class IgnoreTagsLoader(yaml.SafeLoader):
              pass

          def construct_undefined(loader, node):
              if isinstance(node, yaml.ScalarNode):
                  return loader.construct_scalar(node)
              if isinstance(node, yaml.SequenceNode):
                  return loader.construct_sequence(node)
              if isinstance(node, yaml.MappingNode):
                  return loader.construct_mapping(node)
              return None

          IgnoreTagsLoader.add_constructor(
              None,
              construct_undefined,
          )

          def extract_images(kind: str, doc: dict) -> set[str]:
              images = set()
              image_key = KINDS_IMAGE_KEY.get(kind, IMAGE_KEY)

              for key, value in doc.items():
                  if key == image_key:
                      if isinstance(value, dict) and "reference" in value:
                          value = value["reference"]
                      if isinstance(value, str):
                          images.add(value)
                  elif isinstance(value, dict):
                      images.update(extract_images(kind, value))
                  elif isinstance(value, list):
                      for item in value:
                          if isinstance(item, dict):
                              images.update(extract_images(kind, item))

              return images

          images = set()
          for doc in yaml.load_all(Path("cluster.yaml").read_text(), Loader=IgnoreTagsLoader):
              if not isinstance(doc, dict):
                  continue
              kind = doc.get("kind")
              if kind in KINDS:
                  images.update(extract_images(kind, doc))

          Path("images.json").write_text(json.dumps(sorted(images)))
          PY

      - name: Extract Images
        id: extract
        run: echo "${{ matrix.branch }}=$(jq --compact-output '.' images.json)" >> $GITHUB_OUTPUT

  diff:
    if: ${{ needs.extract.outputs.default != needs.extract.outputs.pull }}
    needs: extract
    name: Image Pull - Diff Images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.diff.outputs.images }}
    steps:
      - name: Diff Images
        id: diff
        run: |
          images=$(jq --compact-output --null-input \
              --argjson f1 '${{ needs.extract.outputs.default }}' \
              --argjson f2 '${{ needs.extract.outputs.pull }}' \
              '$f2 - $f1' \
          )
          echo "images=${images}" >> $GITHUB_OUTPUT

  pull:
    if: ${{ needs.diff.outputs.images != '[]' }}
    needs: diff
    name: Image Pull - Pull Images
    runs-on: homelab-runners
    strategy:
      matrix:
        image: ${{ fromJSON(needs.diff.outputs.images) }}
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Install talosctl
        run: curl -fsSL https://talos.dev/install | sh

      - name: Pull Image
        run: talosctl --nodes $NODE image pull ${{ matrix.image }}

  success:
    if: ${{ !cancelled() }}
    needs: pull
    name: Image Pull - Success
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
