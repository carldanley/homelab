---
version: "3"

vars:
  KUBERNETES_UPGRADE_FILE: "{{ .KUBERNETES_DIR }}/apps/system-upgrade/tuppr/upgrades/kubernetes.yaml"
  TALOS_UPGRADE_FILE: "{{ .KUBERNETES_DIR }}/apps/system-upgrade/tuppr/upgrades/talos.yaml"
  KUBERNETES_VERSION:
    sh: yq '.spec.kubernetes.version | select(.)' {{ .KUBERNETES_UPGRADE_FILE }}
  TALOS_VERSION:
    sh: yq '.spec.talos.version | select(.)' {{ .TALOS_UPGRADE_FILE }}
  TALOS_SCHEMATIC_AMD:
    sh: |-
      curl --silent -X POST --data-binary @{{.TALOS_DIR}}/schematic.amd.yaml https://factory.talos.dev/schematics \
        | jq --raw-output '.id'
  TALOS_SCHEMATIC_INTEL:
    sh: |-
      curl --silent -X POST --data-binary @{{.TALOS_DIR}}/schematic.intel.yaml https://factory.talos.dev/schematics \
        | jq --raw-output '.id'

tasks:
  render-template:
    internal: true
    desc: Render a template file using minijinja-cli
    cmd: minijinja-cli --config-file {{ .ROOT_DIR }}/.minijinja.toml {{ .TEMPLATE_FILE }} | op inject > {{ .OUTPUT_FILE }}
    env:
      KUBERNETES_VERSION: "{{ .KUBERNETES_VERSION }}"
      TALOS_VERSION: "{{ .TALOS_VERSION }}"
      TALOS_SCHEMATIC_AMD: "{{ .TALOS_SCHEMATIC_AMD }}"
      TALOS_SCHEMATIC_INTEL: "{{ .TALOS_SCHEMATIC_INTEL }}"
      ENDPOINTS: "{{ .ENDPOINTS }}"
      NODES: "{{ .NODES }}"
      CLUSTER_NAME: "homelab"
    requires:
      vars:
        - TEMPLATE_FILE
        - OUTPUT_FILE
    preconditions:
      - which minijinja-cli

  apply-node:
    desc: Apply Talos config to a node [NODE=required] [MODE=auto] [DEBUG=false]
    cmds:
      # Refresh and validate the same Talos client config used by apply-config.
      - task: write-talconfig
        vars:
          FILE: "{{ .TALOSCONFIG_PATH }}"
      - task: check-talconfig
        vars:
          FILE: "{{ .TALOSCONFIG_PATH }}"

      # Cleanup the rendered template files
      - defer: rm -f {{ .COMMON_TEMPLATE_FILE }}
      - defer: rm -f {{ .ROLE_TEMPLATE_FILE }}
      - defer: rm -f {{ .NODE_TEMPLATE_FILE }}
      - defer: rm -f {{ .REGISTRY_PATCH_FILE }}
      - defer: rm -f {{ .COMPILED_TEMPLATE_FILE }}

      # Attempt to patch together a talos machineconfig file for the node
      - |
        talosctl machineconfig patch "{{ .COMMON_TEMPLATE_FILE }}" \
          --patch "@{{ .ROLE_TEMPLATE_FILE }}" \
          --patch "@{{ .NODE_TEMPLATE_FILE }}" \
          --patch "@{{ .REGISTRY_PATCH_FILE }}" \
          > {{ .COMPILED_TEMPLATE_FILE }}

      # Next, debug the output of the compiled template OR apply it to the node
      - |
        {{ if deepEqual (.DEBUG | lower) "true" }}
          cat {{ .COMPILED_TEMPLATE_FILE }}
        {{ else }}
          talosctl -n {{ .NODE }} apply-config \
            --mode {{ .MODE }} \
            --file {{ .COMPILED_TEMPLATE_FILE }} \
            {{ if deepEqual (.INSECURE | lower) "true" }}--insecure {{ end -}}
        {{ end }}

    vars:
      MODE: '{{ .MODE | default "auto" }}'
      MACHINE_TYPE:
        sh: basename $(dirname $(find '{{ .TALOS_DIR }}' -name '{{ .NODE }}.yaml.j2'))
      COMMON_TEMPLATE_FILE:
        sh: mktemp "${TMPDIR:-/tmp}/homelab-common.XXXXXXXXXX"
      ROLE_TEMPLATE_FILE:
        sh: mktemp "${TMPDIR:-/tmp}/homelab-role.XXXXXXXXXX"
      NODE_TEMPLATE_FILE:
        sh: mktemp "${TMPDIR:-/tmp}/homelab-node.XXXXXXXXXX"
      REGISTRY_PATCH_FILE:
        sh: mktemp "${TMPDIR:-/tmp}/homelab-registry-patch.XXXXXXXXXX"
      COMPILED_TEMPLATE_FILE:
        sh: mktemp "${TMPDIR:-/tmp}/homelab-compiled.XXXXXXXXXX"
      DEBUG: '{{ .DEBUG | default "false" }}'
      INSECURE: '{{ .INSECURE | default "false" }}'
    deps:
      - task: render-template
        vars:
          TEMPLATE_FILE: "{{ .TALOS_DIR }}/common.yaml.j2"
          OUTPUT_FILE: "{{ .COMMON_TEMPLATE_FILE }}"
      - task: render-template
        vars:
          TEMPLATE_FILE: "{{ .TALOS_DIR }}/{{ .MACHINE_TYPE }}.yaml.j2"
          OUTPUT_FILE: "{{ .ROLE_TEMPLATE_FILE }}"
      - task: render-template
        vars:
          TEMPLATE_FILE: "{{ .TALOS_DIR }}/{{ .MACHINE_TYPE }}/{{ .NODE }}.yaml.j2"
          OUTPUT_FILE: "{{ .NODE_TEMPLATE_FILE }}"
      - task: render-template
        vars:
          TEMPLATE_FILE: "{{ .TALOS_DIR }}/registry-auth-config.yaml.j2"
          OUTPUT_FILE: "{{ .REGISTRY_PATCH_FILE }}"
    requires:
      vars:
        - NODE
    preconditions:
      - which op talosctl

      # make sure the schematics exist
      - test -f {{ .TALOS_DIR }}/schematic.amd.yaml
      - test -f {{ .TALOS_DIR }}/schematic.intel.yaml

      # make sure a common template exists
      - test -f {{ .TALOS_DIR }}/common.yaml.j2

      # makes sure the role-specific machineconfig template exists
      - test -f {{ .TALOS_DIR }}/{{ .MACHINE_TYPE }}.yaml.j2

      # make sure we can find the node-specific template
      - find '{{ .TALOS_DIR }}' -name '{{ .NODE }}.yaml.j2'

      # makes sure the registry auth config patch exists
      - test -f {{ .TALOS_DIR }}/registry-auth-config.yaml.j2

      # make sure we're logged into onepassword
      - op vault list &>/dev/null

  write-talconfig:
    desc: Write the Talos config to disk [FILE=optional]
    prompt: Write Talos config to "{{ .TALOSCONFIG_PATH }}" (WILL OVERWRITE) ...?
    cmds:
      - defer: rm -f "{{ .TALOSCONFIG_TEMP_FILE }}"
      - task: render-template
        vars:
          TEMPLATE_FILE: "{{ .TALOS_DIR }}/talconfig.yaml.j2"
          OUTPUT_FILE: "{{ .TALOSCONFIG_TEMP_FILE }}"
          ENDPOINTS: "{{ .ENDPOINTS }}"
          NODES: "{{ .NODES }}"
      - task: check-talconfig
        vars:
          FILE: "{{ .TALOSCONFIG_TEMP_FILE }}"
      - chmod 0600 "{{ .TALOSCONFIG_TEMP_FILE }}"
      - mv -f "{{ .TALOSCONFIG_TEMP_FILE }}" "{{ .TALOSCONFIG_PATH }}"
    vars:
      TALOSCONFIG_PATH:
        sh: |-
          {{ if not (deepEqual (.FILE | default "" | trim) "") }}
          echo "{{ .FILE }}"
          {{ else }}
          echo "{{ .TALOS_DIR }}/talosconfig"
          {{ end }}
      TALOSCONFIG_TEMP_FILE:
        sh: |-
          destination_dir=$(dirname "{{ .TALOSCONFIG_PATH }}")
          mktemp "${destination_dir}/.talosconfig.XXXXXXXXXX"
      ENDPOINTS:
        sh: |-
          FILES=()
          if [ -d "{{ .TALOS_DIR }}/controlplane" ]; then
            for file in "{{ .TALOS_DIR }}/controlplane/"*.yaml.j2; do
              FILES+=($(basename "$file" .yaml.j2))
            done
          fi
          echo "${FILES[@]}" | tr ' ' ','
      NODES:
        sh: |-
          FILES=()
          if [ -d "{{ .TALOS_DIR }}/controlplane" ]; then
            for file in "{{ .TALOS_DIR }}/controlplane/"*.yaml.j2; do
              FILES+=($(basename "$file" .yaml.j2))
            done
          fi

          if [ -d "{{ .TALOS_DIR }}/worker" ]; then
            for file in "{{ .TALOS_DIR }}/worker/"*.yaml.j2; do
              FILES+=($(basename "$file" .yaml.j2))
            done
          fi
          echo "${FILES[@]}" | tr ' ' ','
    preconditions:
      - which chmod dirname mktemp mv op yq

      # make sure the output path resolved
      - test -n "{{ .TALOSCONFIG_PATH }}"
      - test -d "$(dirname "{{ .TALOSCONFIG_PATH }}")"

      # make sure we're logged into onepassword
      - op vault list &>/dev/null

  check-talconfig:
    desc: Check that the Talos CA and client certificates are valid for at least 30 days [FILE=optional]
    cmds:
      - |-
        for field in ca crt; do
          if ! yq -r ".contexts[.context].${field}" "{{ .TALOSCONFIG_PATH }}" \
            | base64 --decode \
            | openssl x509 -checkend 2592000 -noout >/dev/null 2>&1; then
            echo "Talos context ${field} certificate is invalid or expires within 30 days." >&2
            echo "Renew the corresponding Talos certificate in 1Password before applying node configuration." >&2
            exit 1
          fi
        done
    vars:
      TALOSCONFIG_PATH:
        sh: |-
          {{ if not (deepEqual (.FILE | default "" | trim) "") }}
          echo "{{ .FILE }}"
          {{ else }}
          echo "{{ .TALOS_DIR }}/talosconfig"
          {{ end }}
    preconditions:
      - which base64 openssl yq
      - test -f "{{ .TALOSCONFIG_PATH }}"

  write-kubeconfig:
    desc: Write kubeconfig
    cmd: talosctl kubeconfig --nodes {{ .RANDOM_CONTROLLER }} --force {{ .KUBERNETES_DIR }}
    vars:
      RANDOM_CONTROLLER:
        sh: talosctl config info --output json | jq --raw-output '.endpoints[]' | awk 'BEGIN { srand() } { endpoints[NR] = $0 } END { if (NR > 0) print endpoints[int(rand() * NR) + 1] }'
    preconditions:
      - which talosctl jq awk
