---
version: "3"

tasks:
  write-kubeconfig:
    internal: true
    desc: Write kubeconfig
    cmd: talosctl kubeconfig --nodes {{ .RANDOM_CONTROLLER }} --force {{ .KUBERNETES_DIR }}
    vars:
      RANDOM_CONTROLLER:
        sh: talosctl config info --output json | jq --raw-output '.endpoints[]' | awk 'BEGIN { srand() } { endpoints[NR] = $0 } END { if (NR > 0) print endpoints[int(rand() * NR) + 1] }'
    preconditions:
      - which talosctl jq awk

  talos:
    desc: Bootstrap Talos
    prompt: Bootstrap Talos ...?
    cmds:
      - |
        until output=$(talosctl --nodes {{ .NODE }} bootstrap 2>&1 || true) && [[ "${output}" == *"AlreadyExists"* ]]; do
          echo "Waiting for Talos bootstrap to complete..."
          sleep 10
        done
    requires:
      vars:
        - NODE
    preconditions:
      - which talosctl

      # make sure we can get the machineconfig for the randomly selected controller
      - talosctl --nodes {{ .NODE }} get machineconfig

  apps:
    desc: Bootstrap Kubernetes apps
    prompt: Bootstrap Kubernetes apps ...?
    cmds:
      - op inject --in-file {{ .BOOTSTRAP_DIR }}/resources.yaml | kubectl apply --server-side --filename -
      - task: helmfile
    vars:
      RANDOM_CONTROLLER:
        sh: talosctl config info --output json | jq --raw-output '.endpoints[]' | awk 'BEGIN { srand() } { endpoints[NR] = $0 } END { if (NR > 0) print endpoints[int(rand() * NR) + 1] }'
    deps:
      - task: write-kubeconfig
    env:
      KUBECONFIG: "{{ .KUBERNETES_DIR }}/kubeconfig"
    preconditions:
      - which kubectl talosctl jq awk helmfile op

      # make sure we can get the machineconfig for the randomly selected controller
      - talosctl --nodes {{ .RANDOM_CONTROLLER }} get machineconfig

      # make sure the bootstrap resources exist
      - test -f {{ .BOOTSTRAP_DIR }}/resources.yaml

      # make sure the helmfiles exist
      - test -f {{ .BOOTSTRAP_DIR }}/helmfile.d/00-crds.yaml
      - test -f {{ .BOOTSTRAP_DIR }}/helmfile.d/01-apps.yaml

      # make sure we're logged into onepassword
      - op vault list &>/dev/null

  helmfile:
    internal: true
    cmds:
      - |
        helmfile --file {{ .BOOTSTRAP_DIR }}/helmfile.d/00-crds.yaml template --quiet \
          | yq ea -e 'select(.kind == "CustomResourceDefinition")' \
          | kubectl apply --server-side --field-manager bootstrap --force-conflicts --filename -
      - helmfile --file {{ .BOOTSTRAP_DIR }}/helmfile.d/01-apps.yaml sync --hide-notes
    preconditions:
      - test -f {{ .BOOTSTRAP_DIR }}/helmfile.d/00-crds.yaml
      - test -f {{ .BOOTSTRAP_DIR }}/helmfile.d/01-apps.yaml
      - which helmfile kubectl yq
